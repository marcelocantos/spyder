name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # darwin-arm64 only — spyder's value is iOS device orchestration
        # via macOS-specific tooling (xcrun simctl for simulators, the
        # bundled go-ios CLI + tunnel daemon for real devices). Linux
        # builds would need a different device-discovery story; not
        # currently a use case. (🎯T45)
        include:
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Test
        run: go test ./...

      - name: Build spyder
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/spyder" .

      - name: Build go-ios (bundled tunnel daemon)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          # spyder spawns `ios tunnel start --userspace` as a child
          # process for iOS-17+ RSD device discovery. The binary is
          # bundled into libexec/spyder/ in the release tarball and
          # spyder's resolveIOSTunnelBinary finds it via
          # <exe-real-dir>/../libexec/spyder/ios.
          go build -trimpath -ldflags "-s -w" -mod=mod \
            -o "dist/ios" github.com/danielpaulus/go-ios

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_DIR="spyder-${VERSION}-${{ matrix.target }}"
          mkdir -p "${TARBALL_DIR}/bin" "${TARBALL_DIR}/libexec/spyder"
          cp dist/spyder "${TARBALL_DIR}/bin/"
          cp dist/ios "${TARBALL_DIR}/libexec/spyder/"
          mkdir -p dist
          tar czf "dist/${TARBALL_DIR}.tar.gz" "${TARBALL_DIR}"
          ls -la "dist/${TARBALL_DIR}.tar.gz"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/spyder-${VERSION}-${{ matrix.target }}.tar.gz" \
            --clobber

  homebrew:
    name: update-homebrew-tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula_folder: Formula
          version: ${{ github.event.release.tag_name }}
          install: 'bin.install "bin/spyder" => "spyder"; (libexec/"spyder").install "libexec/spyder/ios"'
          target_darwin_arm64: true
          test: 'system bin/"spyder", "--version"'
          skip_checksum: true
          update_readme_table: true
          formula_includes: |
            service do
              run [opt_bin/"spyder", "serve"]
              keep_alive true
              log_path var/"log/spyder.log"
              error_log_path var/"log/spyder.log"
              environment_variables PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
            end

            def caveats
              <<~EOS
                spyder runs as a persistent HTTP MCP server on :3030.
                It is NOT started automatically on install — start it with:

                  brew services start spyder

                Then register it with your agent (Claude Code shown):

                  claude mcp add --scope user --transport http spyder http://localhost:3030/mcp

                Verify:

                  brew services list | grep spyder    # should be "started"
                  lsof -iTCP:3030 -sTCP:LISTEN        # should show spyder

                If MCP tools disappear mid-session, the daemon likely stopped
                — restart with `brew services restart spyder`.

                spyder spawns a bundled `ios` binary (go-ios) as a child
                process for iOS-17+ device discovery. No system LaunchDaemon
                or sudo is required — the tunnel runs in user-space mode.
              EOS
            end
