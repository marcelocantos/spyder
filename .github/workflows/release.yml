name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/spyder" .

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist
          tar czf "spyder-${VERSION}-${{ matrix.target }}.tar.gz" spyder
          ls -la

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/spyder-${VERSION}-${{ matrix.target }}.tar.gz" \
            --clobber

  homebrew:
    name: update-homebrew-tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula_folder: Formula
          version: ${{ github.event.release.tag_name }}
          install: 'bin.install "spyder" => "spyder"'
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          test: 'system bin/"spyder", "--version"'
          skip_checksum: true
          update_readme_table: true
          formula_includes: |
            service do
              run [opt_bin/"spyder", "serve"]
              keep_alive true
              log_path var/"log/spyder.log"
              error_log_path var/"log/spyder.log"
            end
