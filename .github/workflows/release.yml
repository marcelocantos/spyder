name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/spyder" .

      - name: Build pmd3-bridge
        working-directory: bridge
        run: |
          uv sync --dev
          uv run pyinstaller pmd3-bridge.spec \
            --distpath dist --workpath build --noconfirm

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_DIR="spyder-${VERSION}-${{ matrix.target }}"
          mkdir -p "${TARBALL_DIR}/bin" "${TARBALL_DIR}/libexec"
          cp dist/spyder "${TARBALL_DIR}/bin/"
          cp -R bridge/dist/pmd3-bridge "${TARBALL_DIR}/libexec/"
          mkdir -p dist
          tar czf "dist/${TARBALL_DIR}.tar.gz" "${TARBALL_DIR}"
          ls -la "dist/${TARBALL_DIR}.tar.gz"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/spyder-${VERSION}-${{ matrix.target }}.tar.gz" \
            --clobber

  homebrew:
    name: update-homebrew-tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula_folder: Formula
          version: ${{ github.event.release.tag_name }}
          install: 'bin.install "bin/spyder" => "spyder"; libexec.install Dir["libexec/pmd3-bridge"]'
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          test: 'system bin/"spyder", "--version"'
          skip_checksum: true
          update_readme_table: true
          formula_includes: |
            service do
              run [opt_bin/"spyder", "serve"]
              keep_alive true
              log_path var/"log/spyder.log"
              error_log_path var/"log/spyder.log"
              environment_variables PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
            end
