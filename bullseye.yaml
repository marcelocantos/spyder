    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'Per-endpoint bug-detection thresholds are set and named as constants in `internal/bridge`: list_devices 10 s; acquire/refresh/release_power_assertion 10 s; list_apps/battery/launch_app/kill_app/pid_for_bundle 30 s; screenshot 30 s; ready-handshake 10 s (existing)'
