  T59:
    name: iOS log capture surfaces all entries from a target app's PID, not only those from named-subsystem loggers
    status: achieved
    value: 0.0
    cost: 0.0
    actual_cost: 2.0
    acceptance:
    - '`spyder log <udid> --process <bundle-executable> --follow` captures entries logged via `os_log(OS_LOG_DEFAULT, ...)` and `NSLog(...)` from the target app, not only entries logged via `os_log_create(<subsystem>, <category>)` named loggers.'
    - The underlying go-ios capture path uses OSLogStore predicate filtering on the target process's PID (resolved server-side from `--process` or `--bundle-id`) rather than relying on subsystem labels that may be absent.
    - 'Verified end-to-end against a real iOS 17+ device: a third-party app emitting only `os_log(OS_LOG_DEFAULT, "hello %{public}s", "world")` shows up in `spyder log --follow` output. Today such entries are filtered out by the `os_trace_relay` channel.'
    - 'Backward-compatible: existing flows that filter by named subsystem (`spyder log --subsystem com.example.app`) keep working. The new capture is strictly more permissive, not a different scope.'
    - 'Documented in spyder help-agent under the iOS log capture section: the PID-predicate path is described and the previous "named subsystem required" constraint is marked as no longer applicable.'
    context: |-
      Discovered during multimaze2's 🎯T17 ball-strike audio calibration push (2026-05-17 → 2026-05-19) on iOS 26.4.2. The instrumented build called `os_log(OS_LOG_DEFAULT, "T17 marble[%{public}d] v=%{public}.3f ...", ...)` for every Box2D contact-hit event on level 1, expecting `spyder log --follow` to surface them. They never appeared. The 622-line `--process MultiMaze` capture showed plenty of OS-framework chatter (Accelerometer, surfaceID, etc.) but zero entries from the app's own `os_log` calls.

      Workaround that *does* work today: file-scope `os_log_t logger = os_log_create("com.example.app", "Category");` then `os_log(logger, ...)`. The named-subsystem path goes through to the `os_trace_relay` stream; the default-subsystem path is filtered out somewhere between Apple's privacy machinery and the stream consumer.

      This is a usability cliff for consumers: the obvious code path (call `os_log` with defaults) silently produces no visible output, while the discoverable solution (`os_log_create`) is buried in WWDC talks and rarely-read Apple docs. Until spyder captures regardless of subsystem, every consumer rediscovers this the hard way (as multimaze2 did over ~2 days).

      Better mechanism: spyder already resolves bundle-id → PID for `terminate_app`. The same resolution applied to a logarchive / OSLogStore query — `OSLogEntry.processIdentifier == <pid>` — captures *every* entry from the app's process, ignoring subsystem entirely. That's what Xcode Console does when you filter by process; replicating it in go-ios closes this gap.

      **Out of scope**: log archive export (full logarchive download), historical query beyond what OSLogStore exposes, multi-app capture in a single stream.

      **Companion targets**:
      - (this repo, separate target) Fix `--bundle-id <id> --follow` EOF on iOS 26.4.
      - (this repo, separate target) Server-side managed capture sessions to replace `--follow + background shell + kill`.
      - (squz/ge 🎯T66) Cross-platform spdlog sink — relies on this filter relaxation for the iOS path to work for `OS_LOG_DEFAULT` emissions out of the box. (If this target lands, ge can use the default logger; if not, ge must call `os_log_create` itself, which is fine but more boilerplate.)
    tags:
