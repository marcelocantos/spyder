  T72:
    name: spyder migrates off usbmuxd for every operation CoreDevice exposes; usbmuxd wedge degrades only screenshot and oslog stream rather than blocking workflow
    status: set_aside
    value: 0.0
    cost: 0.0
    set_aside_reason: 'Set aside 2026-05-26. Superseded by the v0.48.0 tunnel self-heal (PR #110, commit 4237c9a). The 2026-05-24 root-cause investigation established that the wedge actually hit in practice was NOT a usbmuxd fault but a no-liveness/no-rebuild bug in the bundled go-ios tunnel daemon (fork TunnelManager): a dead device lifeline left a zombie tunnel (listener open, traffic black-holed) that UpdateTunnels never rebuilt because it only checked existence, not health; plus no read deadline on the H2 handshake. v0.48.0 fixes all three and was proven on hardware (kill usbmuxd → detect+rebuild same second, DTX recovered, no daemon restart). This invalidates T72''s premise that ''DTX is permanently degraded when wedged''. There are two distinct wedges: the common tunnel-lifeline wedge (now self-heals) and the rare usbmux-visibility wedge (the original T72/T68 trigger, still real). The devicectl migration (PR #109) is parked as an open draft — a fallback for the usbmux-visibility wedge only, to revisit if that wedge actually recurs in anger. Three useful bits were already cherry-picked out of #109 into #110: the goios.Session 15s timeout, the de-churned wedge loop (former T72.5), and the hermetic go-unit test fix (former T72.6). Resurface this subtree only if the usbmux-visibility wedge bites again.'
    acceptance:
    - The iOS adapter's install/launch/terminate/is_running/list_apps/state/resolve_executable paths invoke xcrun devicectl (or CoreDevice IPC directly) instead of the goios service pools backed by usbmuxd. Existing spyder MCP tools keep their same signatures and semantics; only the implementation underneath changes.
    - Device enumeration (the spyder devices tool) drops usbmuxd from its primary signal and relies on devicectl, with usbmuxd's view used as a fallback / cross-check only. The doctor's IOUSB+devicectl check stays load-bearing for wedge detection but is no longer in the critical path for ordinary operations.
    - When usbmuxd is wedged, spyder still works for everything in the list above. The screenshot and logs (oslog stream) tools, which have no CoreDevice equivalent on iOS 17+, return a structured 'usbmuxd unavailable, this tool degraded' error rather than hanging or failing opaquely. Tool descriptions in the MCP manifest call out the dependency.
    - TEST-REPORT.json live tier exercises the new devicectl-based paths end-to-end and still attests pass / partial. The existing live tests are rewired to work against the devicectl path; new live tests cover the usbmuxd-wedged degraded mode (run with usbmuxd intentionally killed at test setup; assertions check that install/launch/terminate succeed and screenshot fails cleanly).
    - The crashes tool falls back to devicectl device get logs when DTX-based crash retrieval is unavailable; the richer DTX path stays as primary when usbmuxd is healthy.
    - After this lands, the auto-recovery loop in wedge.RunMonitor is downgraded — it no longer fires sudo killusbmuxd every 2 minutes when usbmuxd is wedged. Detection + snapshot still fires, but recovery is gated on either an explicit operator request (spyder doctor --fix) or on a single attempt-and-give-up policy. The current loop is actively harmful when killing usbmuxd doesn't reseat the device (as observed 2026-05-24).
    context: |-
      Filed 2026-05-24 after a multi-hour session of fighting the usbmuxd third-party-visibility wedge. The pattern across the night: iPad and iPhone alternate between visible and missing from usbmuxd; sometimes killing usbmuxd recovers, sometimes (sticky state) it doesn't and only a physical USB unplug+replug clears the device-side state; the spyder daemon's wedge.RunMonitor correctly detects + writes snapshots + invokes auto-recovery, but the recovery itself often does nothing and just churns usbmuxd every 2 minutes.

      The architectural root cause is that Apple has migrated iOS 17+ device communication to CoreDevice (RSD over private TCP-over-USB tunnels) and left usbmuxd in maintenance. Third-party tooling (go-ios, libimobiledevice, pymobiledevice3) is stuck on usbmuxd because CoreDevice's APIs are private. spyder inherits go-ios's usbmuxd dependency.

      The realisation tonight: most of spyder's user-facing surface (install / launch / terminate / list_apps / state / is_running) maps cleanly to xcrun devicectl, which uses CoreDevice and bypasses usbmuxd entirely. Only screenshot and oslog stream are genuinely DTX-locked with no CoreDevice equivalent on iOS 17+. So the right design isn't to keep fighting usbmuxd; it's to use CoreDevice where Apple has exposed it and let the two DTX-dependent tools degrade gracefully when usbmuxd is wedged.

      This is a multi-day refactor, not a one-shot fix. Likely sequenced: (1) audit which go-ios calls in internal/device/ios.go have devicectl equivalents; (2) build a small devicectl wrapper layer; (3) migrate the easy ones; (4) keep usbmuxd-backed paths as fallback initially; (5) eventually flip primary; (6) downgrade auto-recovery's killusbmuxd loop.

      Sibling to T68 (the trigger investigation), not a sub-target of it — this is the alternative path that sidesteps T68's question entirely for most operations.
    depends_on:
    - T72.1
    - T72.2
    - T72.3
    - T72.4
    - T72.5
    - T72.6
    origin: manual
    discovered: 2026-05-24
