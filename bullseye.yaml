  T99.3:
    name: The daemon detects its own wedged-but-alive state and self-restarts as last resort — supervised relaunch, never a human
    status: achieved
    value: 13.0
    cost: 8.0
    actual_cost: 5.0
    acceptance:
    - health.ProgressWatchdog instruments tool dispatch and drives the daemon-self entity — a handler stuck past its deadline-cancel grace flips daemon-self out of healthy (today it is registered but nothing observes it, internal/daemon/health.go:44-47)
    - On a confirmed self-wedge (cancellation failed to clear it), the daemon persists a goroutine dump + wedge snapshot under ~/.spyder/ and exits nonzero
    - 'Supervised relaunch is verified for the blessed long-running mode: brew services / launchd KeepAlive. Bare `spyder serve` in a terminal is not required to self-re-exec; docs state that wedged-but-alive recovery for production/dev daemons is launchd (or an equivalent external supervisor)'
    - Self-restart is rate-limited (e.g. at most N restarts per window); thrashing on a permanent external fault escalates to needs_attention without infinite restart loops
    - 'Synthetic wedge test: an injected never-returning handler leads to automatic restart under the supervised path and a subsequent successful tool call with zero human/agent action'
    - 'In-flight state loss on restart is bounded and documented: reservations, log-capture sessions, app-channel listeners, streamrelay catalogue and live player sessions — what survives (if anything) and what does not. Stream sessions may drop; that is accepted for v1'
    context: |-
      Gap G3 plus the dominant unfixed failure mode from the mnemo history: ≥6 manual kill+restart incidents since 2026-04-25 and zero self-restarts ever. launchd KeepAlive covers crash/exit only — blind to wedged-but-alive, which is exactly what the unwired ProgressWatchdog was built to detect. Recovery ladder: T99.1 cancellation first; this target is escalation when cancellation cannot clear the wedge.

      2026-07-16 tighten: blessed supervisor = launchd/brew; bare serve need not re-exec; rate-limit restarts; streamrelay session drop accepted and documented.
