  T60:
    name: Server-side managed log capture sessions replace the agent-side --follow + background-shell + kill dance
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'New MCP tools `log_capture_start` and `log_capture_stop`. `log_capture_start({device, bundle_id?, process?, subsystem?, regex?, owner?})` returns `{session_id, started_at}` and begins streaming into a server-managed buffer immediately. `log_capture_stop({session_id})` returns `{captured_lines: [...], stopped_at, dropped_lines?}` and tears the session down. Sessions are owned by the caller and auto-expire (configurable TTL, default 5 min) if not stopped.'
    - 'Companion CLI: `spyder log <device> --capture` starts a session and prints `session_id`; `spyder log --capture-stop <session_id>` retrieves the lines. The existing `--follow` SSE stream stays in place for human-driven tailing; the new tools are the agent-friendly path.'
    - An optional `log_capture_get({session_id})` returns whatever lines are currently buffered without stopping the session — useful for incremental progress checks during long captures.
    - Server-side buffer is bounded (configurable, default 50 MB / 100 k lines per session) with FIFO eviction; `dropped_lines` is non-zero in the return payload when eviction occurred so the caller knows the capture wasn't lossless.
    - 'Sessions are persisted across daemon restarts only loosely: a graceful daemon shutdown drains active sessions to a temp file; a crash drops them (documented). Re-attaching to a session_id after daemon restart returns a clear error.'
    - 'Documented in help-agent and the MCP tool descriptions: the session lifecycle, when to prefer `log_capture_*` over `--follow`, and the buffer-bound trade-offs.'
    context: |-
      Current agent-driven log capture against an iOS device goes:

      1. `spyder log --follow --process X > /tmp/cap.log 2>&1 &` (in bash, background)
      2. Save the shell PID; sleep briefly to confirm it's running.
      3. Ask the user to reproduce the scenario.
      4. User says "done".
      5. `kill <pid>` to stop the tail.
      6. `grep` the file for the wanted regex.

      This is brittle in practice (observed during multimaze2's 🎯T17 calibration push, 2026-05-17 → 2026-05-19):

      - The agent must use shell tooling — there's no MCP-native way to start a bounded capture, leaving capture state outside the MCP protocol.
      - Background-process management is shell-fragile: kill signals don't always flush stdio, stale PIDs accumulate, multiple concurrent captures collide on the temp file name.
      - `--follow` is SSE-streaming; some clients (and the agent's curl in MCP-host environments) buffer aggressively and drop final lines on disconnect.
      - For multi-minute captures with intermittent activity, there's no clean way to peek at progress without stopping the stream.
      - Restarting the daemon mid-capture silently kills the tail with no recovery.

      A server-managed session model fixes all of this. The session_id is the durable handle. start / stop are normal MCP RPC calls. The agent doesn't touch shell or file paths. The server handles buffering, eviction, expiry, and concurrent-session isolation.

      This composes nicely with the bundle-id-fix and PID-predicate targets — the start call accepts the same filter set as `log` today, and benefits from any filter-correctness improvements landing in parallel.

      **Out of scope**: persisting capture artifacts to long-term storage, distributed/cross-host sessions, log archive export.
    tags:
    - logs
    - mcp
    - dev-experience
    - agent-ux
    - surfaced-by:multimaze2
    origin: manual
    discovered: 2026-05-19
    achieved: 2026-05-20
