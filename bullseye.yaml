  T24:
    name: Sim/emu pool with two readiness tiers and configurable linger-on-release
    status: achieved
    value: 0.0
    cost: 0.0
    showcase: true
    actual_cost: 5.0
    acceptance:
    - 'Pool catalogue at ~/.spyder/pool.yaml (or similar) declares stock sim/emu templates: device-type + runtime/system-image + tags + min/max desired-ready counts + per-template linger duration + per-template warm-pool size'
    - |-
      Two readiness tiers tracked per template:
         - **available**: AVD/sim already created on disk, not booted (cheap to spin up)
         - **running**: booted and idle, ready to hand off in ~milliseconds
    - On startup, daemon reconciles the pool against desired counts — creates missing AVDs/sims, optionally pre-boots up to the configured `running` warm-pool size
    - On `release`, the underlying sim/emu does NOT immediately tear down. The **server-side** linger period (configured per template in pool.yaml, with a global default override via env) keeps it in the `running` tier; if reservation comes back within the window, hand it off without re-boot. After linger expires, transition to `available` (shutdown but keep on disk) or destroy entirely if `available` count is at cap
    - '**Client API stays minimal: reserve when you need a device, release when you don''t.** Linger, warm-pool size, mint vs. reuse, and shutdown decisions are all spyder''s. The client doesn''t have to think about lifecycle optimisation — spyder owns that based on host capacity and observed traffic patterns'
    - 'Each sim/emu is cloned from a stock template so that two reservations of the same template get fully independent state (Android: AVD directory clone with new ports; iOS: fresh `simctl create` from the same device-type+runtime)'
    - 'MCP/REST tools: `pool_list` (current state per template), `pool_warm <template>` (force pre-boot N), `pool_drain <template>` (shut down + delete idle members)'
    - 'CLI: `spyder pool list|warm|drain`'
    - 'Pool participates in fuzzy reservation (🎯T23): selector resolution prefers a `running` tier hit, then `available`, then mint-new'
    - Physical devices are explicitly out of scope for the pool — they pass through to the existing reservation flow unchanged
    - Pool state survives daemon restart (reconciliation re-walks the catalogue + the disk state)
    context: |-
      Without a pool, every sim/emu reservation pays full boot cost (30-90s for Android, 10-20s for iOS) and every release destroys state, repeating that cost on the next request. The pool amortises boot across many short reservations and lets test runs hand off devices in milliseconds.

      Two readiness tiers are deliberate:
      - **available** is cheap on disk (a few GB per AVD/sim) and requires only `boot` to use.
      - **running** consumes RAM (1-2GB per emulator, 0.5-1GB per sim) and needs proactive management — the warm-pool size is a quality-of-service knob the user tunes per their host's headroom.

      Linger-on-release is the magic: an iterating test loop (`run; release; run; release;`) shouldn't pay re-boot per cycle. 5 minutes is a reasonable default — long enough to absorb most edit-rerun cycles, short enough that an idle pool drains overnight.

      Cloning is the mechanism for "two of the same":
      - iOS: `simctl create` from a stock device-type+runtime is the native clone primitive. Cheap (~few seconds).
      - Android: AVD directories are filesystem clones — `cp -r ~/.android/avd/<template>.avd ~/.android/avd/<template>-N.avd` plus a one-line edit to the .ini. Console/adb ports auto-allocate from the 5554+2N range (16-emulator default cap; document if a host needs more).

      Depends on \ud83c\udfafT18 (lifecycle primitives) since pool actions are sequenced lifecycle calls. Pairs with \ud83c\udfafT23 (fuzzy reservation) — the pool is the substrate that makes selector resolution cheap.

      Out of scope: cross-host pool sharing (a pool on Mac A serving requests from Mac B). The daemon is single-host by design.</context>
      <parameter name="depends_on">["T18"]
    tags:
    - sim
    - emu
    - pool
    - performance
    - linger
    origin: manual
    discovered: 2026-04-19
