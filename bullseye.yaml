      Won't fix. Reclassified 2026-04-27 from parked to wont-fix on
      reflection: T29 was speculative test coverage searching for an
      unknown failure mode, not a known invariant in need of a guard.
      The thing it was trying to catch — "iPad sleeps when spyder
      thinks it's awake" — is already covered by three independent
      existing mechanisms:

      1. `autoawake.Supervisor` keeps KeepAwake foregrounded; iOS
         guarantees screen-on while a foregrounded app holds it. The
         load-bearing invariant.
      2. The supervisor's `isKeepAwakeRunning` check (the Python bridge
         `process-id-for-bundle-id`) catches the silently-exited-
         KeepAwake case; the supervisor relaunches.
      3. 🎯T27's fd-leak regression test guards the specific regression
         that motivated stay-awake monitoring in the first place.

      For T29 to catch something those miss would require a new failure
      mode no one has predicted — at which point the right action is a
      fresh target scoped to that specific bug, not this speculative
      one. Tests cover known invariants; they don't fish for unknowns.

      The investigation that produced `/v1/device_power_state` and
      `docs/papers/t29-device-state-detection.md` still has standalone
      value (the endpoint is shipped in v0.17.0 and may be useful for
      other purposes), so this is wont-fix on the *test* aspect, not a
      rollback of the prototype work.

      Earlier disposition (2026-04-26, parked): the third acceptance
      criterion — a mechanical `TestDevice_StaysAwake_Mechanical` — was
      abandoned because it was conflating a host-side power assertion
      with the iPad's actual stay-awake mechanism (the foregrounded
      KeepAwake app), and DevicePowerState turned out not to be a
      trustworthy oracle. See `docs/papers/t29-device-state-detection.md`
      for the full disposition note.
