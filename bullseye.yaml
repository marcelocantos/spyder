  T73:
    name: launch_app and deploy_app forward an env map to the launched app process on iOS and Android
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'MCP `launch_app` accepts an optional `env: {KEY: VALUE, ...}` map argument.'
    - MCP `deploy_app` accepts the same and forwards it to the launch step.
    - REST `/api/v1/launch_app` and `/api/v1/deploy_app` accept the same parameter.
    - iOS adapter passes env through go-ios `appservice.LaunchApp`'s env parameter; the app sees the keys via `getenv()`.
    - Android adapter forwards env entries via `am start -e KEY VALUE` (Intent extras). A documented helper pattern in agents-guide.md shows how the app's Java/Kotlin shim reads the extras and calls `setenv()` in JNI before `SDL_main` runs.
    - Unit tests assert env passthrough on both iOS and Android handlers (mock adapters; no live device needed).
    - A live test (gated on `SPYDER_LIVE_UDID`/`SPYDER_LIVE_ANDROID_SERIAL`) launches an app with a known env var and verifies the app observes it (e.g. echoes it to a log line or a file, captured back).
    - agents-guide.md documents `LOG_TARGET=host:port` as a convention — apps that opt in (see the ge network-sink target) install a network log sink targeting this address. The env name is convention only and is not owned by spyder; spyder itself treats the env map as opaque key/value pairs.
    context: |-
      Filed 2026-05-31 after multimaze2 / ge debugging on Jevons (iPad mini A17 Pro) showed that iOS unified logging is unreliable enough as a developer's primary diagnostic channel that consumers need an escape hatch. The escape hatch (network TCP sink in the app — see paired ge target) needs a way to be configured at deploy time without source edits. The natural fit is a per-launch env var passed through to the app process.

      iOS supports this cleanly today: go-ios's appservice.LaunchApp accepts an env map[string]string parameter that becomes the launched process environment, readable via plain getenv(). The mechanism is the same one Xcode's "Scheme → Arguments → Environment Variables" uses.

      Android is the awkward sibling: adb shell am start passes Intent extras, not env vars. The app must extract the extra and setenv() it into native code before the C++ entry point runs. Documenting the standard shim pattern (Java/Kotlin activity reads extra, JNI helper sets env, then SDL_main fires) is part of the deliverable.

      Generic env passthrough is the deliberately-narrow surface: spyder doesn't need to know about log targets specifically. Apps that opt into the LOG_TARGET convention get network logging; apps that want to pass other env vars (feature flags, dev sandbox markers, test fixture identifiers) get them for free. Resist the temptation to grow this into a fuller "launch options" schema (working directory, signal handlers, etc.) — narrow start, expand only on concrete demand. Aligns with [[feedback_minimal_client_api]].

      LOG_TARGET (not SPYDER_LOG_TARGET, not GE_LOG_TARGET): the env var is convention-shared between any tool that injects it and any library that reads it; namespacing it to either side gets the ownership wrong.

      Paired with the ge network-sink target for the consumer side; either can land first.
    tags:
    - mcp
    - launch
    - env-passthrough
    - ios
    - android
    - dev-experience
    - surfaced-by:multimaze2
    origin: manual
    discovered: 2026-05-31
    achieved: 2026-05-31
  T74:
    name: LOG_TARGET dev-logging is resilient across manual app relaunches and spyder listener lifecycle gaps
    status: set_aside
    value: 0.0
    cost: 0.0
    set_aside_reason: Moot — log_collect_* (raw-text TCP path) was removed in v0.58.0; all app→spyder logging now flows through the app_channel structured push (`log` push message → `app_log_get`). The original concern (LOG_TARGET pointing at an ephemeral log_collect session that the app loses on manual relaunch) still exists in principle for app_channel sessions, but the failure mode is qualitatively different — the app's hello handshake either succeeds or fails cleanly, and the session resolves the lifetime question by being identity-bound rather than port-bound. Re-file as a fresh app-channel-flavoured target if real usage surfaces the same friction shape against the new path.
    acceptance:
    - Real-world experience using spyder log_collect_* + ge's LOG_TARGET sink has been accumulated for at least a few sessions across multiple repos (multimaze2, tiltbuggy, esfera2, yourworld2). User has noted the specific friction points encountered — missing logs after a SpringBoard/launcher relaunch, dead listeners, port reuse confusion, etc.
    - |-
      Based on that experience, a concrete remediation has been chosen and documented. Candidate shapes the design must pick from (or replace with something better surfaced by real use):
        - (a) app-side persistence of LOG_TARGET to NSUserDefaults / SharedPreferences / config file, with lookup precedence env > persisted > none, and `LOG_TARGET=` (empty) as the opt-out (filed against ge if chosen).
        - (b) spyder runs a long-lived stable log_collect listener bound to a per-device or per-bundle port that persists across `start`/`stop` cycles, so the app's persisted LOG_TARGET continues to find a live listener.
        - (c) a spyder `relaunch_app` MCP tool that remembers the last env per (device, bundle_id) and re-injects on demand — hides the limitation without fixing it.
        - (d) explicitly document the gap and the user-tap-icon caveat; close as won't-fix because in practice the manual relaunch is rare and `launch_app` is cheap.
    - Whichever path is chosen is implemented and shipped. agents-guide.md (spyder side) and the ge equivalent are updated to describe the actual lifecycle the user can expect.
    context: |-
      Filed 2026-06-01 as a deferred follow-up to 🎯T73 (env passthrough, shipped in spyder v0.50.0) and ge 🎯T83 (TCP log sink, in flight).

      Background: 🎯T73 lets spyder inject `env={LOG_TARGET: host:port}` at launch time, and ge T83 will install a spdlog tcp_sink in the app when it sees that env var. The combination gives a clean dev-time log channel that bypasses Apple unified logging and Android logcat.

      The gap: env vars passed via `appservice.LaunchApp` / `am start --es` / `SIMCTL_CHILD_*` are *per-launch* attributes. A user-tap relaunch from SpringBoard or the Android launcher loses them — logs silently stop arriving. Conversely, even if the app *persists* LOG_TARGET app-side, there's no guarantee spyder is still listening on the original port when the app reconnects after a manual restart (`log_collect` sessions are ephemeral, ports are random per-session).

      Both halves have a fix; both fixes have their own complications:
      - App-side persistence (ge) is cheap but assumes a stable listener.
      - Stable spyder listener (per-device or per-bundle) is more lifecycle plumbing than the v0.51 log_collect ships with — and may not be worth it if manual-relaunch isn't a frequent flow in practice.

      **Don't speculate the design now.** Live with the env-only path first, capture the friction points across a few real debugging sessions, then pick a remediation that fits actual usage. The candidate shapes in the acceptance are a starting menu, not a commitment. Won't-fix (option d) is a legitimate outcome.

      [[T73]] [[ge T83]]
    tags:
    - logging
    - lifecycle
    - log_target
    - deferred
    - experience-needed
    - surfaced-by:multimaze2
    origin: manual
    discovered: 2026-06-01
