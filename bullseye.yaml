  T86:
    name: iostunnel supervisor restarts the child reliably across `go test -count=N` iterations (no cross-iteration stall)
    status: set_aside
    value: 0.0
    cost: 0.0
    set_aside_reason: 'Plateau P: test isolation flake; post-P hygiene, not migration.'
    acceptance:
    - '`go test -run TestSupervisorRestartsUnexpectedExit -count=50 ./internal/iostunnel/` passes every iteration'
    - Root cause of the ~8% cross-iteration restart stall (restart not observed within 30s under -count) is identified — e.g. a restartLoop goroutine or child process from a prior iteration not fully reaped on Stop, or a test-isolation leak — and fixed at its source, not by widening the per-iteration deadline
    - The fix does not regress the single-run or parallel-suite paths
    context: |-
      Surfaced 2026-06-28 during the v0.62.0 release run. Investigation found TWO distinct failure modes for TestSupervisorRestartsUnexpectedExit:

      1. Parallel-suite CPU-contention overrun (the real `make test-report` gate failure): the test allowed only 5s for a restart (restartLoop's 1s backoff + shell re-spawn), which occasionally overran under the parallel full suite. FIXED in the v0.62.0 release PR by widening the deadline to 30s in supervisor_test.go:60 — verified green with 3/3 full parallel `go test ./...` runs. This mode is closed.

      2. Cross-iteration stall under `go test -count=N` (THIS target's remaining scope): with the 30s deadline, `-count=50` still failed ~8% (3/50 hit the full 30s, restart genuinely not observed; plus 1 fast failure from an attempts-file read/write race in the test). Fresh-process count=1 is 0/20 — the stall only manifests across same-process iterations, pointing to a leaked restartLoop goroutine / unreaped child / shared state between supervisors rather than a deadline issue. This is the real defect and is NOT fixed by the release PR.

      Fix is test-and-possibly-supervisor work, out of scope for the screenshot release. Tracked here for a dedicated PR. Note: also worth hardening the test's attempts-file read against partial writes (the 2.14s fast-fail mode).
