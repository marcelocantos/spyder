  T56:
    name: spyder runs entirely on go-ios; the Python bridge, the Python bridge-tunneld, and xcrun devicectl are decommissioned
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Single Go binary `spyder` (user-space) plus `ios tunnel start` (system LaunchDaemon, root) is the entire runtime. No Python anywhere; no the Python bridge subprocess; no `bridge/` Python tree in the repo.
    - All iOS device operations (list, launch, kill, screenshot, syslog, app_state, foreground_app, install, uninstall, crash reports, battery, device_power_state, power assertions) route through `github.com/danielpaulus/go-ios` as a Go module dependency.
    - The tunnel daemon is the upstream go-ios `ios tunnel start`, supervised by launchd as a system LaunchDaemon. The previous the Python bridge-tunneld system daemon is stopped and removed.
    - Zero `xcrun devicectl` invocations in spyder Go code (xcrun simctl for the simulator adapter is unrelated and stays).
    - 'Demonstration: deploy MultiMaze to iPad-mini (iPad mini, iOS 26) and the iPhone iPhone via spyder''s MCP/REST API; both apps stay foregrounded across multiple autoawake convergence ticks; screenshot, syslog, and is_running tools all work; bridge supervisor / the Python bridge process / the Python bridge-tunneld launchd job all confirmed absent.'
    context: 'Decision 2026-05-10. The the Python bridge architecture (Python FastAPI subprocess fronting the Python bridge) has hit two structural limits: (1) asyncio event-loop wedges under concurrent load — when a synchronous blocking call in the Python bridge parks the loop, every endpoint times out simultaneously (observed at 14:43 UTC during four parallel deploy_app calls + autoawake foreground probes); (2) the in-scope subset of the Python bridge is ~16k Python LOC of subtle iOS protocol code that we''d have to track through every iOS major. github.com/danielpaulus/go-ios is a mature ~33k-LOC Go reimplementation of the same protocols, MIT-licensed, actively maintained (commits within days), used in production by Sauce Labs / BrowserStack. Migrating cuts language count to one, removes the bridge subprocess entirely, and gives us native goroutine concurrency: a slow per-device call no longer takes down the whole listener. The Code=1002 / "No provider was found" devicectl provisioning failures we''ve been carrying for the iPhone are a CoreDevice-specific failure mode that go-ios''s installation_proxy path doesn''t have, so we get a free fix to that class of issue. iOS-26 RSD InvalidService intermittency may or may not improve — that''s the spike''s question (T56.1).'
    tags:
    - migration
    - ios
    - platform
    - go-ios
    origin: manual
    discovered: 2026-05-10
    achieved: 2026-05-10
