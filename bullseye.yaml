    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'Test helpers for resource-axis accounting: process-group fd count (`lsof -g`), Go runtime.NumGoroutine, runtime.ReadMemStats, subprocess-tree descendant count; each exposed via `internal/bridge/testutil` or equivalent so tests across packages can assert on the same axes'
    - Primitive helper `assertNoResourceLeak(t, fn, iterations, maxDelta)` snapshots the chosen axis before and after running fn N times; fails if delta > maxDelta. Works for any of the axes above via a tiny sampler closure
    - 'Per-tier coverage: integration tier asserts no leak for fake-services happy paths (Uvicorn / FastAPI / Go supervisor / client paths should not leak regardless of the Python bridge); device tier asserts no leak for real-the Python bridge list_devices, battery, screenshot, list_apps, and the full acquire→refresh→release assertion lifecycle'
    - Device-tier `TestDevice_StaysAwakeUnderAutoawake` runs the real bridge with a constrained fd limit (via `SPYDER_BRIDGE_FD_LIMIT` passed through the dev wrapper's `ulimit -n`) so leaks surface within the test window rather than after hours; autoawake runs against a real device for a configurable duration (default 60 s) and asserts the handle map stays populated and refreshable throughout. This is the release gate for the fd-leak class
    - New `soak` suite in `scripts/test-report.sh`, gated by `SPYDER_SOAK=1`, runs long-horizon variants (10 min default) of the stay-awake and pool-lifecycle tests. Emitted in `TEST-REPORT.json` as an additional tier alongside integration and device
    - '`autoawake.Supervisor.Status()` exposes the current udid→handle map so tests can assert assertions are held without reading private fields'
    - The stay-awake test, when run against the v0.7.0 pre-fix code, FAILS (proves it catches the regression); when run against the fixed code it PASSES. Evidence recorded in a PR description or commit trailer
    context: |-
      Raised 2026-04-22 after v0.7.0 shipped with an fd leak in services.list_devices (and every other _lockdown caller) that manifested as EMFILE ~4 minutes into autoawake polling, causing iPad-mini to fall asleep despite the new T26 hardening. The T26 work ensures the daemon detects and crashes when the bridge goes unresponsive — but this failure mode doesn't go unresponsive, it goes slowly-wrong: list_devices returns a structured BridgeError (bridge_error, 500, "Too many open files") that the fail-fast path correctly classifies as legitimate and propagates, while the underlying issue — a file-descriptor leak — silently drives the system into failure. Per-call unit tests against fakes don't allocate real file descriptors and therefore can't see this class of bug. Resource-leak tests require real subprocesses, real sockets, and enough iterations to surface the drift. T27 is the infrastructure for that category. The stay-awake test is the first concrete instance and is gating on T26.2-class releases.</context>
