      User runs multiple parallel dev sessions (separate Claude Code instances, separate projects) that all talk to the same device fleet via spyder. Without coordination, session B's launch_app or keepawake yanks focus during session A's xcodebuild test. spyder is the natural owner of this state — it's a single daemon per host, every client flows through it, and it already owns device inventory.\n\nDesign agreed with user on 2026-04-19:\n- Strict on mutating tools, advisory on read tools.\n- Owner identity is a free-form string; convention is filepath.Base(cwd). Not server-assigned — keeps 'iPad is held by tiltbuggy' readable.\n- Agents aren't required to reserve before mutating calls: if the device is free, the call just works. They only pay the token cost when they want an exclusive hold.\n- spyder run is the blessed path that makes this ergonomic: it auto-reserves, opportunistically renews, and releases on exit.\n- Auto-awake cooperates — skips devices held by non-self; doesn't hold its own reservations (launches are fast).\n- Persistence via ~/.spyder/reservations.json so brew services restart doesn't orphan a live spyder run.\n\nDeferred: force: true override, interactive macOS notification UX, multi-device reservations in a single call.</context>
