    set_aside_reason: 'Plateau P: go-ios DTX investigation parked as long-horizon upstream research, not migration.'
    acceptance:
    - Root cause of the go-ios `instruments.ListenAppStateNotifications.Close()` leak documented — either confirmed in current upstream (https://github.com/danielpaulus/go-ios) or determined that newer versions ship a fixed Close(). Reproducer recorded.
    - Either (a) an upstream PR is open / merged that makes Close() actually tear down the DTX conn, or (b) spyder vendors a forked go-ios with the fix, or (c) spyder uses a different go-ios API that doesn't have the bug, or (d) we conclude the leak is fundamental and document a different keep-awake mechanism.
    - 'An iOS keep-awake mechanism — restored KeepAwake supervisor or alternative — works end-to-end against a real device for ≥30 min without leaking tunnel connections (verified via lsof: no monotonic growth at the convergence cadence). The standalone manual ios/KeepAwake sidecar does not satisfy this by itself because it is not supervised by spyder.'
    - 'If reinstating automated KeepAwake: tests cover the leak-free path (goroutine + connection accounting in an integration test if feasible). The manual sidecar source may be reused, but spyder-side deploy/launch/convergence must still be rebuilt deliberately.'
