    value: 13.0
    cost: 8.0
    actual_cost: 5.0
    acceptance:
    - The MCP transport context reaches Handler.Dispatch and every handler — internal/daemon/daemon.go no longer discards it (the `_ context.Context` at daemon.go:265) and internal/mcp/server.go Dispatch takes a ctx
    - Each tool has a deadline class (e.g. fast read ≤15s, device op ≤60s, install ≤5min — tunable vars); on breach the call returns a structured timeout error naming the tool, device, and elapsed time
    - 'On deadline: the in-flight call is cancelled at the dispatch layer; any device session used by that call is invalidated (not left cached in a wedged state) so the next call can re-resolve'
    - deploy_app install path is abortable within the install deadline for the 2026-07-16 hang class — if underlying zipconduit/SendFile is not yet cooperative-cancel, the call still returns a structured timeout and the session is invalidated rather than hanging forever
    - watchSlowDispatch escalates from logging to cancelling at the deadline; the 2026-07-16 deploy_app 180s+ hang class is reproduced in a test (synthetic stall) and returns a structured error
    - REST callers get the same bound (the REST path shares dispatch)
    - 'OUT OF SCOPE for T99.1 (optional follow-on): cooperative cancel threaded through every go-ios/adb call site. v1 ships dispatch deadlines + session invalidate; named hot-path cooperative cancel may land in the same PR when cheap but does not block this target'
    context: |-
      Gap G1/G2/G8 from the 2026-07-16 deep dive. Nothing — client disconnect, shutdown, timer — can cancel an in-flight tool call today; device I/O (SendFile, LaunchApp, screenshot, terminate, uninstall, crashreport) takes no context, only session-resolve (15s) and devicectl (32s) are bounded. PR #106 added observability only. Foundation of the recovery ladder: cancel first, self-restart (T99.3) only when cancellation cannot clear it.

      2026-07-16 tighten: v1 = dispatch ctx + tool-class deadlines + session invalidate + structured timeout; not a full cooperative-cancel migration of go-ios/adb.
