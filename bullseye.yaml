  T10:
    name: Auto-deploy and auto-launch KeepAwake on every iOS device that appears
    status: achieved
    value: 13.0
    cost: 5.0
    showcase: true
    actual_cost: 5.0
    acceptance:
    - spyder serve supervises every iOS device that tunneld reports as paired, with no flag or allow-list — all iOS/iPadOS devices, all the time
    - When a new iOS UDID appears in tunneld (including on spyder startup), spyder checks whether KeepAwake is installed via pymobiledevice3 apps query
    - 'If KeepAwake is not installed, spyder auto-deploys: runs xcodebuild targeting that specific UDID (so the device is registered with the provisioning profile) and then devicectl install. Requires Xcode Accounts already signed in and one-time device trust (out-of-band manual step)'
    - If KeepAwake is not currently running, spyder launches it via the existing LaunchKeepAwake path. If it's already running, skip (no yank-focus loop)
    - 'On successful launch, spyder fires a macOS notification via osascript (title ''spyder'', body ''Launched KeepAwake on <alias> — unlock the device if the app isn''t visible''). Dual-purpose: confirms the action on an unlocked device and prompts the user to unlock if it is'
    - Unplug/replug is the natural re-trigger — device disappears from tunneld then reappears, and spyder treats it as new
    - Graceful shutdown on SIGINT/SIGTERM; supervisor goroutine exits cleanly on context cancel
    - Failures (trust not granted, xcodebuild error, devicectl error) are logged and the supervisor moves on — other devices are unaffected
    context: 'Natural closing feature: plug in an iPad, it just starts keeping itself awake — no Shortcut needed, no manual launch. Pairs with the just-landed KeepAwake unplug-exit so the whole plug/unplug loop is self-managing.\n\nSimplification vs. the original asks:\n- \"Only if no app running\" was originally meant as foreground-app awareness, but iOS foreground detection via pymobiledevice3 turned out murky (dvt applist has no frontmost flag; sysmon process single returns a huge process list with no foreground indicator). Practical substitute: only launch if KeepAwake isn''t already running (via dvt process-id-for-bundle-id). Avoids the yank-focus loop on repeated polls. The normal use case (plug in and walk away) works correctly; a user actively using Safari when they plug in will get a single interruption.\n- Lock-state detection was also explored and skipped for the same reason — no clean pymobiledevice3 primitive surfaces current lock state on iOS 17+. Replaced with always-fire notification after a launch: serves as a confirmation when the device is unlocked and a prompt when it isn''t.\n\nAuto-deploy requires locating the KeepAwake Xcode project. For v1 we discover it relative to spyder''s CWD and via a SPYDER_KEEPAWAKE_PROJECT env-var override. Long-term the project should be //go:embed''d and extracted on first use, but that''s a refinement.\n\nOut of scope: the one-time device-trust step (Settings → General → VPN & Device Management → Trust) is Apple-imposed and unautomatable.'
    tags:
    - ios
    - supervisor
    - automation
    - keepawake
    origin: manual
    discovered: 2026-04-18
    achieved: 2026-04-18
  T11:
    name: Reservation system for parallel dev sessions across devices
    status: achieved
    value: 13.0
    cost: 5.0
    actual_cost: 5.0
    acceptance:
    - 'Four new MCP tools: reserve, release, renew, reservations — each with structured result shapes (reservation_id, device, owner, expires_at, note)'
    - 'Existing mutating tools (keepawake, screenshot, launch_app, terminate_app) gain strict-reservation enforcement: reject with a clear conflict error if someone else holds the device; proceed if free or owner matches'
    - Read tools (devices, resolve, device_state, reservations) are unaffected by reservations
    - spyder run [--as <owner>] auto-acquires a reservation for the command's lifetime; owner defaults to filepath.Base(cwd); opportunistic renewal so long-running commands don't expire mid-run; release on exit (defer) regardless of success/failure/panic
    - Auto-awake supervisor uses owner id "autoawake"; skips devices held by anyone else (no yank-focus mid-test)
    - Reservations persist to ~/.spyder/reservations.json; expired entries pruned on daemon startup and on any access
    - 'Device identity is normalized via inventory: reserving "Pippa" also blocks operations against Pippa''s raw UDID/CoreDevice UUID and vice versa'
    - Default TTL 3600s; max 86400s; renew accepts the same bounds
    - Unit tests cover acquire / release / renew / conflict / TTL expiry / persistence round-trip / normalization
    context: |-
      User runs multiple parallel dev sessions (separate Claude Code instances, separate projects) that all talk to the same device fleet via spyder. Without coordination, session B's launch_app or keepawake yanks focus during session A's xcodebuild test. spyder is the natural owner of this state — it's a single daemon per host, every client flows through it, and it already owns device inventory.\n\nDesign agreed with user on 2026-04-19:\n- Strict on mutating tools, advisory on read tools.\n- Owner identity is a free-form string; convention is filepath.Base(cwd). Not server-assigned — keeps 'Pippa is held by tiltbuggy' readable.\n- Agents aren't required to reserve before mutating calls: if the device is free, the call just works. They only pay the token cost when they want an exclusive hold.\n- spyder run is the blessed path that makes this ergonomic: it auto-reserves, opportunistically renews, and releases on exit.\n- Auto-awake cooperates — skips devices held by non-self; doesn't hold its own reservations (launches are fast).\n- Persistence via ~/.spyder/reservations.json so brew services restart doesn't orphan a live spyder run.\n\nDeferred: force: true override, interactive macOS notification UX, multi-device reservations in a single call.</context>
      <parameter name="observable">true
    tags:
    - mcp-tool
    - session-state
    - concurrency
    origin: manual
    discovered: 2026-04-19
    achieved: 2026-04-19
  T12:
    name: Non-agent consumers (CLI, shell scripts, CI) can drive spyder via a REST API on the daemon, sharing the same reservation-authorised handlers as MCP
    status: achieved
    value: 13.0
    cost: 5.0
    showcase: true
    actual_cost: 5.0
    acceptance:
    - 'Daemon exposes REST endpoints on the same HTTP listener as /mcp covering: devices, resolve, device_state, screenshot, list_apps, launch_app, terminate_app, keepawake, reserve, release, renew, reservations'
    - REST handlers share the same authorization path as MCP (same Authorize() check on mutating ops; reservation state identical regardless of transport)
    - 'spyder CLI gains subcommands that dial the local daemon via REST (no direct pymobiledevice3/adb fallback): devices, screenshot, reserve, release, renew, reservations, resolve, device_state, list_apps, launch_app, terminate_app, keepawake'
    - CLI auto-starts the daemon if it isn't running (same pattern as the existing stdio proxy)
    - A shell script can acquire a reservation, take a screenshot, and release — concurrently with an agent session — without either clobbering the other's state
    - README/agents-guide documents the REST surface and CLI commands
    context: |-
      Today the daemon's only network surface is `/mcp` (JSON-RPC), and the only non-agent entry point is `spyder run <cmd>` (reservation-wrapping shell wrapper). Tests and smoke scripts (e.g. ge/tools/smoke-test.sh, ge/tools/rotation-stability-test.sh) have no way to enumerate devices, take screenshots, or hold reservations without either embedding an MCP client or bypassing spyder and shelling out to pymobiledevice3/adb directly. Bypassing defeats the reservation invariants — two concurrent consumers (e.g. an agent and a CI run) would corrupt each other's device state.

      Everything must go through the daemon so reservation state stays centralised. A REST surface on the existing HTTP server is the right shape: the CLI becomes a thin REST client (`spyder devices`, `spyder screenshot --device Pippa`, `spyder reserve`/`release`/`renew`), and any language or `curl` can participate without linking MCP. MCP remains for agents; REST and MCP share the same underlying handler code and the same Authorize() checks.

      Reservation semantics are already production-grade (file-backed, atomic-rename, TTL leases, owner-auth on mutations) — the hard part is done. This target is purely about transport.
    origin: manual
    discovered: 2026-04-19
    achieved: 2026-04-19
