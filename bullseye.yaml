    acceptance:
    - '`list_apps({device})` returns installed third-party apps with bundle id, name, and version. iOS: `pymobiledevice3 apps list` (no DDI needed). Android: `adb shell pm list packages -3` + `cmd package dump <pkg>` for names'
    - '`launch_app({device, bundle_id})` foregrounds an arbitrary app on the device. iOS: `pymobiledevice3 developer dvt launch <id>` (needs 🎯T7). Android: `adb shell monkey -p <pkg> -c android.intent.category.LAUNCHER 1`'
    - '`terminate_app({device, bundle_id})` stops an arbitrary app. iOS: sysmon/kill by PID (needs 🎯T7). Android: `adb shell am force-stop <pkg>`'
    - Each tool returns structured results and distinguishes 'device not connected', 'app not installed', and 'tool unavailable' errors
    context: 'Broader app-lifecycle control so agents driving mobile test workflows don''t need to fall back to mobile-mcp or Xcode for routine install/launch/kill operations. iOS side leans on the research-confirmed split: `apps list` works without DDI, launch/terminate need tunneld. Android side is straightforward adb. Defer `install_app` and `uninstall_app` to a later target unless/until a use case lands — they''re heavier and less common than the runtime trio.'
