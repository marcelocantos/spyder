  T26.3:
    name: 'Streaming bridge calls: NDJSON for list endpoints, octet-stream for file pulls, inter-packet deadline panics on stall'
    status: achieved
    value: 0.0
    cost: 0.0
    observable: true
    acceptance:
    - '`crash_reports_list` and the Android crash-equivalent return `Content-Type: application/x-ndjson` with one JSON object per line over chunked transfer encoding'
    - '`crash_reports_pull` returns `Content-Type: application/octet-stream` with chunked transfer encoding; the Go client exposes the response body as an `io.Reader` rather than buffering'
    - FastAPI side uses `StreamingResponse` over an async generator that drops into the AFC layer directly (if pmd3's `CrashReportsManager.list()` doesn't expose iteration, the bridge walks AFC itself)
    - Go client sets a 10 s read deadline on the underlying `net.Conn` and *resets it on each chunk successfully received*; a gap > 10 s panics the daemon
    - Outer end-to-end deadline for streaming calls is 30 min, acting as a safety net only — the inter-packet deadline is the real bug detector
    - No new Go dependency is added; client uses `bufio.Scanner` for NDJSON and `io.Copy` (with a per-read deadline) for binary streams
    - No change to atomic endpoints; the streaming mechanism is strictly additive to 🎯T26.2
    - An integration test in 🎯T26.4 exercises both streaming shapes end-to-end, including induced inter-packet stall (bridge sends one chunk then SIGSTOPs itself), and asserts the daemon panics within the threshold
    context: 'Some bridge endpoints are legitimately slow — a device with thousands of crash reports can take minutes to enumerate, and a large crash-log file can take tens of seconds to pull. The upper bound on legitimate duration is unknowable, so a whole-result timeout is either too tight (false crash) or too loose (fails to detect hang). Streaming inverts the question: "how long between signs of progress is legitimate?" The answer is a few seconds at most, because pmd3''s AFC (Apple File Conduit) protocol is file-by-file and adb streams lines. NDJSON + chunked transfer was chosen over SSE (binary-unfriendly, reconnect semantics actively wrong for us), WebSockets (bidirectional, overkill, no request/response shape), and gRPC (replaces the entire protocol, new codegen toolchain in both languages). A 1-hour spike may be needed first to confirm pmd3''s `CrashReportsManager` surface exposes iteration; if not, the bridge drops to the AFC layer directly.'
