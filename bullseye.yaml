  T89:
    name: Spyder self-recovers from stale RemoteXPC tunnels after iOS device re-enumeration — a hub power-cycle or unplug/replug never needs a manual daemon restart
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Both T89.1 (consumer detect-stale -> re-establish -> retry, plus the shared re-establish primitive) and T89.2 (usbmux attach/detach re-establishment) are achieved.
    - 'GATING ORACLE (class-1): a simulated re-enumeration harness drops and re-attaches a connected iOS device (synthetic usbmux detach+attach via the T89.2 event seam against the T89.1 fake tunnel daemon) and shows spyder tunnel acquisition recovering automatically — no real hardware.'
    - 'RESIDUE (class-4, HIL, non-gating): after a real USB hub power-cycle or unplug/replug, spyder screenshot / app_exec / deploy against a re-attached iOS-17+ device succeeds with no `brew services restart spyder` and no user intervention. Confirmed once in the live/device tier; skips routinely.'
    - 'NOTE: the former T89.3 (doctor tunnel-liveness view) and T89.4 (watchdog) are folded into T90.3 and T90.1/T90.5 respectively — T89 now covers only the acute device-tunnel recovery core.'
    context: 'Filed 2026-07-04 after a live failure: the USB hub power-cycled, both connected iPads re-enumerated on USB, and the long-lived `ios tunnel start --userspace` daemon (spawned by launchd-managed `spyder serve`) kept running while holding STALE RemoteXPC tunnels. Its tunnel-info server (127.0.0.1:60105) then returned empty JSON for the re-enumerated device UDID, so every consumer (screenshot, deploy, app_exec) failed with the misleading `unexpected end of JSON input (is ''ios tunnel start'' running?)` — the daemon WAS running; it just had no live tunnel for a device that was physically present. Only `brew services restart spyder` recovered it. Root cause: tunnels are not invalidated/re-established on device re-enumeration, and consumers treat a stale tunnel as a hard error rather than a recoverable one. The four sub-targets add self-healing at the consumer, event, diagnostic, and watchdog layers. They share ONE primitive — "given an attached device with a stale/missing tunnel, tear down and re-establish a fresh RemoteXPC tunnel for it" — built once in T89.1 and reused by the rest. Adjacent to T84 (RSD tunnel still-settling on first appearance, achieved) and T86 (iostunnel supervisor restart across test iterations).'
    depends_on:
    - T89.1
    - T89.2
    origin: manual
    discovered: 2026-07-04
    achieved: 2026-07-11
  T89.1:
    name: A tunnel-consuming spyder command transparently re-establishes a stale tunnel and retries once before erroring (and builds the shared re-establish primitive)
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'When TunnelInfoForDevice returns empty or malformed for a device that usbmux reports as attached (structurally guaranteed: resolve() calls ios.GetDevice successfully BEFORE the tunnel-info call), spyder classifies it as a stale tunnel and re-establishes it by forcing the daemon to drop the possibly-zombie tunnel (DELETE /tunnel/{udid}), then polling GET /tunnel/{udid} until the daemon''s 1s UpdateTunnels loop rebuilds a live tunnel (bounded), and retries the operation exactly once before surfacing any error.'
    - 'ORACLE (gating, class-1): a fake tunnel-daemon HTTP server (httptest, extending internal/goios/retry_test.go''s pattern) serves empty/404 tunnel-info for an attached UDID, accepts DELETE /tunnel/{udid}, and flips to valid tunnel-info after the delete+rebuild. The primitive is built against this fake FIRST; a table test drives stale -> re-establish -> retry-success AND stale -> rebuild-never-arrives -> single error with no infinite retry.'
    - The re-establish-single-device-tunnel primitive is factored out as a reusable Resolver helper (DELETE + bounded poll-until-live + own-cache Invalidate), consumed by T89.2 and reused by T90.1's device-tunnel recovery policy.
    - 'RESIDUE (class-4, HIL, non-gating): on real hardware a screenshot/app_exec against a device whose tunnel went stale recovers on the automatic retry with no `brew services restart spyder`. Confirmed once in the live tier; skips routinely.'
    context: 'Cheapest, highest-value fix and the foundation for the others: it introduces the shared re-establish primitive and wraps the tunnel-consuming path with detect-stale -> re-establish -> retry-once. Would have made the 2026-07-04 hub-cycle failure invisible. MECHANISM (verified against vendored go-ios d78573d186a3): the go-ios daemon''s tunnel-info GET returns 404 with an EMPTY body when FindTunnel(udid) has no live tunnel, so TunnelInfoForDevice (which never checks status code) fails json.Unmarshal with ''unexpected end of JSON input'' — that IS the stale symptom. go-ios exposes exactly one mutating HTTP lever, DELETE /tunnel/{udid} -> tm.stopTunnel; the daemon''s 1s UpdateTunnels loop then rebuilds because the device is still in ios.ListDevices(). ORACLE-FIRST: acceptance split by verification class per the 2026-07-04 graph reshape.'
    origin: manual
    discovered: 2026-07-04
    achieved: 2026-07-11
