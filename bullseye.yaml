      - File: `~/go/pkg/mod/github.com/danielpaulus/go-ios@v1.0.213/ios/instruments/instruments_notifications.go` — the buggy `Close()` is at the bottom.
      - Pinned version: see `go.mod` for the current go-ios pin.
      - The upstream repo is https://github.com/danielpaulus/go-ios.

      **Don't worry about source preservation**: per user (2026-05-19), recover the deleted KeepAwake Swift source / autoawake package from git history when ready to reinstate — the v0.39.0 commit (b11ef81) is the last with everything in place.

