      Filed 2026-05-19 alongside 🎯T63's removal. The KeepAwake / autoawake supervisor was ripped out because its per-convergence-tick `instruments.ListenAppStateNotifications` call leaked a TCP connection to the bundled `ios` tunnel daemon every 15s per attached device — go-ios's `Close()` does `closeChannel <- struct{}{}` (a no-op channel send) instead of `conn.Close()` on the underlying DTX connection, so the socket stays ESTABLISHED and pinned by the captured recv closure. After ~5 min the daemon would stop responding to HTTP entirely.

