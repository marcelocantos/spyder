  T10:
    name: Auto-deploy and auto-launch KeepAwake on every iOS device that appears
    status: achieved
    value: 13.0
    cost: 5.0
    actual_cost: 5.0
    acceptance:
    - spyder serve supervises every iOS device that tunneld reports as paired, with no flag or allow-list — all iOS/iPadOS devices, all the time
    - When a new iOS UDID appears in tunneld (including on spyder startup), spyder checks whether KeepAwake is installed via the lockdown apps query
    - 'If KeepAwake is not installed, spyder auto-deploys: runs xcodebuild targeting that specific UDID (so the device is registered with the provisioning profile) and then devicectl install. Requires Xcode Accounts already signed in and one-time device trust (out-of-band manual step)'
    - If KeepAwake is not currently running, spyder launches it via the existing LaunchKeepAwake path. If it's already running, skip (no yank-focus loop)
    - 'On successful launch, spyder fires a macOS notification via osascript (title ''spyder'', body ''Launched KeepAwake on <alias> — unlock the device if the app isn''t visible''). Dual-purpose: confirms the action on an unlocked device and prompts the user to unlock if it is'
    - Unplug/replug is the natural re-trigger — device disappears from tunneld then reappears, and spyder treats it as new
    - Graceful shutdown on SIGINT/SIGTERM; supervisor goroutine exits cleanly on context cancel
    - Failures (trust not granted, xcodebuild error, devicectl error) are logged and the supervisor moves on — other devices are unaffected
    context: 'Natural closing feature: plug in an iPad, it just starts keeping itself awake — no Shortcut needed, no manual launch. Pairs with the just-landed KeepAwake unplug-exit so the whole plug/unplug loop is self-managing.\n\nSimplification vs. the original asks:\n- \"Only if no app running\" was originally meant as foreground-app awareness, but iOS foreground detection turned out murky (dvt applist has no frontmost flag; sysmon process single returns a huge process list with no foreground indicator). Practical substitute: only launch if KeepAwake isn''t already running (via dvt process-id-for-bundle-id). Avoids the yank-focus loop on repeated polls. The normal use case (plug in and walk away) works correctly; a user actively using Safari when they plug in will get a single interruption.\n- Lock-state detection was also explored and skipped for the same reason — no clean lockdown primitive surfaces current lock state on iOS 17+. Replaced with always-fire notification after a launch: serves as a confirmation when the device is unlocked and a prompt when it isn''t.\n\nAuto-deploy requires locating the KeepAwake Xcode project. For v1 we discover it relative to spyder''s CWD and via a SPYDER_KEEPAWAKE_PROJECT env-var override. Long-term the project should be //go:embed''d and extracted on first use, but that''s a refinement.\n\nOut of scope: the one-time device-trust step (Settings → General → VPN & Device Management → Trust) is Apple-imposed and unautomatable.'
    tags:
    - ios
    - supervisor
    - automation
    - keepawake
    origin: manual
    discovered: 2026-04-18
    achieved: 2026-04-18
  T100:
    name: Agent-directed multi-server multi-player streaming works across iOS, Android, and desktop with orientation-aware player variants
    status: achieved
    value: 13.0
    cost: 20.0
    actual_cost: 13.0
    acceptance:
    - A first-class spyder surface (MCP/app_exec verb and CLI) launches the player on a named device/platform with only device + game-server name required; the agent never sets STREAM_ADDR / stream_addr / SERVER_NAME / Documents files by hand
    - 'When the named server is registered, its orientation preference is visible to spyder before player launch (server sideband advertisement), and spyder deploys/launches the matching player variant: portrait → PlayerPort, landscape → PlayerLand, any/unspecified → Player (or desktop equivalent)'
    - Two distinct server processes (tiltbuggy and multimaze2 server builds) can be registered on one spyder at the same time and appear as separate catalogue entries
    - 'Same-name server re-registration replaces the prior holder cleanly (rebuild-and-run workflow): old sideband closed, prior sessions for that name evicted, new process owns the catalogue entry — not silent map overwrite leaving zombie sessions, and not refuse-on-conflict'
    - Two players can attach concurrently to the same server (or to different servers) and each session has independent s2p frame traffic (fps_1s_s2p > 0 and non-trivial bytes) — not a single-winner / zero-frame second attach
    - 'Cross-product verified live: at least one concurrent matrix covering iOS + Android + desktop players against tiltbuggy and multimaze2 (each platform proves attach + non-black/game content for both games where hardware is available; desktop covers both games)'
    - No QR / camera discovery UI is required or shown when the agent-directed launch path is used
    - GET /stream/servers and GET /stream/sessions (or verb equivalents) correctly reflect multi-server and multi-session state for the verification matrix
    - 'Unit/integration coverage exists for: multi-server catalogue, same-name clean replace, multi-session pairing independence, orientation advertisement → variant selection, and the launch_player argument surface (no real devices required for pure relay/unit cases)'
    - All children T100.1–T100.6 are achieved
    context: |-
      Product model (2026-07-16, revised same day):
      1. No UI-based discovery for multi-server selection — the human tells the agent which game to attach to; agents launch via a first-class spyder surface (not hand-rolled STREAM_ADDR / env / Intent extras).
      2. Game servers advertise portrait/landscape (or any) preference to spyder; spyder selects the matching player packaging variant (PlayerPort / PlayerLand / Player any) when deploying/launching.
      3. Multiple game servers may be registered on the relay at once (distinct catalogue names).
      4. Same-name server re-connect is intentional REPLACE (rebuild-and-run): new process takes the name; old sideband/sessions are cleanly evicted — not refuse, and not a bare map overwrite.
      5. Multiple players may be attached at once to one or many servers (full multi-session).
      6. Any player may attach to any game server independently of other players.

      Oracle games: tiltbuggy and multimaze2 server builds.

      Gaps this umbrella closes:
      - Relay keys servers by name and opens many sessions, but ge ServerSession is single-player (`!hasPlayer` — second attach gets 0 frames) — ge fix, tracked under T100.2.
      - Same-name register overwrites the map without closing the old sideband or evicting sessions — T100.1.
      - No launch_player (or equivalent) verb/CLI — T100.3.
      - Orientation is known in SessionConfig after attach, not on server sideband hello for pre-launch variant selection — T100.4.
      - multimaze2 may need stream-stack uplift — T100.5.
      - Live matrix not yet proven — T100.6.

      Non-goals unless later expanded: browser player matrix, public internet relay, automatic game-server process spawn (servers may still be started out-of-band as long as they register).

      2026-07-16 hygiene: scored + decomposed into T100.1–T100.6; parent rolls up when children are achieved.
    depends_on:
    - T100.1
    - T100.2
    - T100.3
    - T100.4
    - T100.5
    - T100.6
    tags:
    - player
    - stream
    - relay
    - ios
    - android
    - desktop
    - tiltbuggy
    - multimaze2
    - orientation
    - agent-ux
    - umbrella
    origin: manual
    discovered: 2026-07-16
    achieved: 2026-07-16
