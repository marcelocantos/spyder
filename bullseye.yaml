  T53:
    name: the Python bridge dylib relocation succeeds during brew install (no "Failed to fix install linkage" warning)
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'A fresh `brew install marcelocantos/tap/spyder` (or `brew reinstall`, or `brew upgrade`) on macOS arm64 completes with zero "Error: Failed to fix install linkage" output.'
    - The bundled PyInstaller artifact at libexec/the Python bridge/_internal/ contains dylibs/.so files whose Mach-O headerpad is large enough that brew's install_name_tool rewrite from @rpath references to absolute /opt/homebrew/Cellar/spyder/<v>/libexec/the Python bridge/_internal/... paths fits without "Updated load commands do not fit in the header" errors.
    - The fix lives in the bridge build (PyInstaller spec, pyproject.toml, or a post-build dylib-padding step), not in the homebrew formula. Formula-level workarounds were investigated and ruled out — `fix_dynamic_linkage` is on brew's Keg class with no clean per-formula override, and post_install runs too late.
    context: 'Discovered during the v0.30.0 release (and reproduced in every release back to v0.28.0). Brew prints `Error: Failed changing dylib ID of /opt/homebrew/Cellar/spyder/<v>/libexec/the Python bridge/_internal/pydantic_core/_pydantic_core.cpython-312-darwin.so from @rpath/... to /opt/homebrew/opt/spyder/libexec/the Python bridge/_internal/pydantic_core/...`. The error message itself names the fix: `Updated load commands do not fit in the header... needs to be relinked, possibly with -headerpad or -headerpad_max_install_names`. Brew rescues the exception and continues, so the install completes with the bin symlink intact and the bridge runtime works (PyInstaller''s bootloader resolves dylibs at runtime, ignoring the system @rpath). The "error" is therefore cosmetic but loud. The durable fix is to rebuild bundled wheels with `LDFLAGS="-Wl,-headerpad_max_install_names"` or post-process the PyInstaller bundle with `install_name_tool` to set headerpad before tarballing in release.yml. Investigated and ruled out: formula-side overrides via `formula_includes` (brew''s fix_dynamic_linkage is on Keg, not Formula; post_install runs too late; mach_o_files has no formula-level filter).'
    tags:
    - bridge
    - homebrew
    - dylib
    - cosmetic-warning
    origin: surfaced 2026-05-06 during v0.30.0 release verification
    discovered: 2026-05-09
    achieved: 2026-05-10
