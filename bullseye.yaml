schema_version: 1
targets:
  T1:
    name: Bimodal spyder MCP server registers with Claude Code and dispatches tool calls end-to-end
    status: achieved
    value: 13.0
    cost: 3.0
    actual_cost: 3.0
    acceptance:
    - go build produces a single working binary at bin/spyder
    - spyder serve listens on ~/.spyder/spyder.sock and stays up across connections
    - spyder (no args) auto-starts the daemon and speaks MCP JSON-RPC over stdio
    - claude mcp add --scope user spyder -- spyder registers the server and Claude Code sees all four tools (devices, resolve, keepawake, device_state)
    - Tool calls round-trip through the proxy → daemon → handler path and return structured results
    context: 'Umbrella target — decomposed into 🎯T1.1–🎯T1.6 on 2026-04-18 to introduce observable checkpoints and unblock convergence. Rolls up automatically once 🎯T1.6 is achieved. Original scope: foundation for everything else, scaffold using mnemo-style flat layout and sawmill-style auto-starting daemon via mcpbridge.'
