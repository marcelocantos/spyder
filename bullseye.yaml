    - 'The state is observable without the act of observation changing it — i.e. querying the state does not itself count as user activity and reset the device''s idle timer. Current IOPMrootDomain queries via DiagnosticsService fail this criterion (they reported IOPMUserIsActive: true even against a confirmed-asleep device), so this target rules out that path'
    - A device-tier Go test TestDevice_StaysAwake_Mechanical acquires an assertion via autoawake, waits 60 s, queries the state, asserts awake; separately, with spyder stopped, waits 60 s, queries, asserts asleep. If both branches pass, the signal works
