  T57:
    name: Bridge supervisor recovers from wedged liveness probe without crashing
    status: set_aside
    value: 0.0
    cost: 0.0
    set_aside_reason: |-
      Superseded 2026-05-17 by 🎯T56's architectural rewrite. The crash this target named (`internal/bridge/supervisor.go:207` nil-deref in `Supervisor.Restart`, invoked from `livenessProbeAt` after `wedge_threshold=3`) is in code that no longer exists: 🎯T56 (commit 1f8505c, merged 2026-05-10) decommissioned the entire `bridge` package — there is no Supervisor.Restart, no liveness probe, no wedge_threshold anywhere on master. The remaining `internal/iostunnel/supervisor.go` deliberately documents "no liveness probes (a wedged tunnel surfaces as call-level errors in goios.Resolver.Session, where the cache invalidation already drives recovery)" — the recovery path T57 wanted to harden was designed out, not reimplemented.

      Timeline confirms the diagnosis: the panic log lines are dated 2026/05/10 16:01, which is *before* T56 merged at 16:56 the same day. The user observed the iOS-unreachable symptom on 2026-05-13 against v0.34.0 (Homebrew), but v0.34.0 cannot produce that stack frame. The most plausible reading is that the daemon process under launchctl / brew-services was still the pre-T56 binary, never restarted after the upgrade — a `brew services restart spyder` would have brought up the new architecture in which this specific failure mode does not exist.

      If a wedge-recovery failure recurs on the new in-process go-ios path, the right action is a fresh target scoped to the new architecture, not a revival of T57.
    acceptance:
    - A wedged in-process Go bridge (3 consecutive liveness-probe timeouts at 127.0.0.1:<port>/v1/health) triggers a clean Restart() that brings the bridge back online without the supervisor itself panicking.
    - Specifically, supervisor.go:207 (Supervisor.Restart) no longer nil-derefs when invoked from livenessProbeAt after a wedge_threshold=3 trip.
    - After the recovery, /v1/list_devices answers within its normal latency budget and downstream MCP tools (deploy_app, launch_app, screenshot) succeed on iOS devices that were attached the whole time.
    - Regression covered by a unit / integration test that simulates a wedged bridge state and verifies Restart() completes without panic.
    - Existing devices remain visible in spyder devices --platform ios after the auto-recovery — no manual brew services restart spyder needed.
    context: |-
      Observed 2026-05-13 while deploying multimaze2 builds to iPad-mini (iPad mini A17 Pro, iOS 26.4.2) and the Test iPhone (iPhone 13, iOS 26.4.2). adb-backed Android deploys kept working; both iOS devices reported "Device not found. Is it attached to the machine?" via spyder deploy_app, even though Xcode could see them and they hadn't been touched since the previous successful deploy hours earlier.

      Diagnosed via ~/.spyder/daemon.log. The relevant tail:

      ```
      2026/05/10 16:01:11 WARN bridge call transport error — daemon stays up, supervisor will recover error="bridge: /v1/health: transport error after 5s: Post \"http://127.0.0.1:52473/v1/health\": context deadline exceeded"
      2026/05/10 16:01:11 WARN bridge liveness: probe failed error="..." consecutive_fail=2 wedge_threshold=3 last_duration_ms=5001
      2026/05/10 16:01:41 WARN bridge liveness: probe failed error="..." consecutive_fail=3 wedge_threshold=3 last_duration_ms=5000
      2026/05/10 16:01:41 ERROR bridge liveness: wedge detected — restarting bridge consecutive_fail=3
      panic: runtime error: invalid memory address or nil pointer dereference
      [signal SIGSEGV: segmentation violation code=0x2 addr=0x0 pc=0x102b1cc58]

      goroutine 28 [running]:
      github.com/marcelocantos/spyder/internal/bridge.(*Supervisor).Restart(0x9d91df20170?, {0x10339e4b0?, 0x9d91dff0540?})
          github.com/marcelocantos/spyder/internal/bridge/supervisor.go:207 +0x28
      github.com/marcelocantos/spyder/internal/bridge.livenessProbeAt({0x10339e4b0, 0x9d91dff0540}, 0x9d91e03c000, {0x10339ae40, 0x0}, 0x6fc23ac00)
          github.com/marcelocantos/spyder/internal/bridge/supervisor.go:607 +0x4e8
      created by github.com/marcelocantos/spyder/internal/daemon.Run in goroutine 1
          github.com/marcelocantos/spyder/internal/daemon/daemon.go:90 +0x310
      ```

      The wedge itself (the underlying stall in the Go bridge — bridge name is vestigial; spyder migrated to its own in-process Go bridge) is a separate concern. This target is narrowly about the recovery path being more broken than the thing it's recovering: the supervisor's own Restart() crashes when invoked from the liveness-probe path, leaving the bridge dead forever and the daemon's port (52473) unbound. lsof -iTCP:52473 confirms nothing listens.

      User impact: every iOS device operation fails until brew services restart spyder is run manually. Two days in a row across multiple deploy cycles; not transient. Daemon was left running for further diagnosis at user's request.

      spyder version: v0.34.0 (Homebrew).
    tags:
    - bug
    - reliability
    - ios
    origin: manual
    discovered: 2026-05-13
