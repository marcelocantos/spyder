  T87:
    name: iOS log capture surfaces app os_log (named-subsystem INFO/WARN), not just the syslog-relay subset
    status: set_aside
    value: 0.0
    cost: 0.0
    set_aside_reason: 'Plateau P: os_log depth improvement parked into post-P reliability/observability theme with T89.'
    acceptance:
    - '`spyder logs` / `log_capture_*` for an iOS device returns the app''s own os_log output — entries emitted via `os_log_create(<bundle-id>, <category>)` at INFO/NOTICE/WARN/ERROR — not only the legacy syslog-relay subset (CoreAnimation / CoreMotion / system Debug lines).'
    - 'Verified against a ge-based app (e.g. multimaze, CFBundleExecutable `MultiMaze`): its SPDLOG_INFO/WARN lines (ge routes these to `os_log_with_type` via `os_log_create(<bundleID>, "ge")`) appear in the capture and are filterable.'
    - The `bundle_id` filter resolves and returns the same app lines as `process` — today `bundle_id=com.squz.multimaze` returns empty while `process=MultiMaze` returns system-only logs.
    - Mechanism + tradeoffs documented (unified-log streaming vs go-ios syslog relay; log volume; `<private>` redaction of os_log args).
    context: |-
      Surfaced 2026-06-29 while debugging a multimaze touch-freeze on an iPad mini A17 (alias Jevons, iOS 26.5). `spyder logs process=MultiMaze since=-90s` returned ~9000 lines of iOS SYSTEM logs attributed to the process (CoreAnimation `surfaceID`/`beginTime`, `[Accelerometer]` samples, watchdog ping) — useful for proving the app was alive (rendering + sensors flowing, not hung) — but ZERO of the app's own diagnostics. Every leveled entry was `\"level\": \"Debug\"` (system); there were no INFO/WARN lines, and none of the app's SPDLOG markers (`Edge-swipe`, `Selected level`, `🎯T62`, etc.). `bundle_id=com.squz.multimaze` returned empty entirely.

      Root cause: go-ios's `syslog` service (com.apple.syslog_relay) streams the legacy syslog subset, which excludes os_log INFO/DEBUG entries from *named subsystems* — those persist only in the unified log (queryable via `log show/stream --predicate 'subsystem == \"…\"'`). So spyder can't surface a ge app's own logs on-device, which defeats the agents-guide \"exhaust programmatic checks before asking the user\" workflow exactly when it's most needed (diagnosing input/rendering bugs). The app-channel (`SPYDER_APP_CHANNEL`) is the structured alternative but is dev-network-dependent and out of scope for USB-only device testing.

      ge's logging contract: ge/CLAUDE.md → \"Logging (🎯T66)\" — Apple sink is `os_log_with_type` via `os_log_create(<bundle-id>, \"ge\")`, INFO→OS_LOG_TYPE_INFO, WARN→DEFAULT, ERR→ERROR. A fix likely needs an `OSLogStore` / unified-log streaming path (or instruments) rather than the syslog relay. Likely related to the existing iOS-17-tunnel log gaps (spyder 🎯T78).
    tags:
    - ios
    - logging
    - os_log
    - observability
    - multimaze-debug
    origin: manual
    discovered: 2026-06-29
