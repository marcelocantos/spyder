    - On timeout, dial-refused, EOF, EPIPE, or HTTP 5xx with `code=unknown`, the daemon panics with a descriptive message including the call name, elapsed time, and a short tail of the bridge's stderr
    - Structured `BridgeError` responses (device_not_paired, bundle_not_installed, tunneld_unavailable, pmd3_error) are NOT treated as bugs and propagate as typed errors to callers unchanged
    - The `autoawake` silent-swallow path (`autoawake.go:102-104 return // quiet retry`) is replaced with a panic on any non-BridgeError failure
    - The `Supervisor.watchdog` restart-on-exit machinery (`supervisor.go:248-341`) is deleted; bridge subprocess exit during normal operation panics the daemon
    - A liveness probe goroutine in `Supervisor` calls `ListDevices` every 30 s with the 10 s threshold; a failure panics the daemon, catching the wedge case
    - launchd / `brew services` restarts the whole daemon on panic; user-visible behaviour is "bridge bug → daemon restarts cleanly with a stack trace in the log" rather than silent non-functionality
    context: The conversation on 2026-04-22 established that the bridge is a same-host, same-trust-domain subprocess. Network-resilience patterns (retry, backoff, circuit breaker) don't apply — any failure is a bug, and the correct reliability mechanism is bug detection + crash, letting the external supervisor restart. Timeouts are generous (2–5× observed worst-case legitimate durations) so that a breach is a strong "bug" signal rather than a "slow device" signal. Structured errors from pmd3 itself (device_not_paired, etc.) are legitimate and stay as errors. Everything else panics. The wedge case that triggered this discussion — child process alive, Uvicorn not accepting connections — is specifically caught by the liveness probe.
