    context: 'Empirically observed across v0.28, v0.29, and v0.30 releases: `brew upgrade marcelocantos/tap/spyder` puts the new version in `/opt/homebrew/Cellar/spyder/<v>/` but `/opt/homebrew/bin/spyder` ends up missing, requiring manual `brew link --overwrite`. Fresh `brew install` (after `brew uninstall`) does NOT exhibit this — the symlink is correctly created. So the bug is specific to the `upgrade` code path. Hypothesis examined and ruled out 2026-05-06: `fix_dynamic_linkage` failing causes the missing symlink. False — brew rescues the exception and continues, and `link(keg)` runs BEFORE `fix_dynamic_linkage` in formula_installer.rb. A fresh install with the dylib error firing still ends with the symlink in place. The actual upgrade-specific cause is unidentified because every release captured only `tail -5` of the upgrade output, which truncates the diagnostically relevant lines. The release skill now `tee`s the full output, so the next release should give us complete diagnostic data. Possible causes to investigate when the data lands: (a) brew''s upgrade flow unlinks old before installing new, and the new install hits a path where link() is conditionally skipped (e.g. when brew detects "would conflict with cask"); (b) the formula-name collision with the published `spyder` cask in homebrew-cask triggers different code paths during upgrade vs install; (c) a launchd-running-old-spyder file lock interaction during the unlink-old/install-new transition.'
