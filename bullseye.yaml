  T7:
    name: spyder supervises pymobiledevice3 tunneld for reliable iOS DVT access
    status: achieved
    value: 8.0
    cost: 8.0
    showcase: true
    actual_cost: 3.0
    acceptance:
    - spyder detects and health-probes an externally-managed tunneld on startup (default 127.0.0.1:49151) and logs the paired-device count on success
    - When tunneld is unreachable, DVT-dependent tools (🎯T5 foreground, 🎯T8 iOS screenshot, 🎯T9 iOS launch/terminate) return a specific 'tunneld unavailable — start pymobiledevice3 remote tunneld or enable --supervise-tunneld' error; non-DVT tools (devices list, resolve, keepawake, Android state) are unaffected
    - 'Optional: --supervise-tunneld flag spawns `sudo -n pymobiledevice3 remote tunneld` as a managed child with clean shutdown on SIGINT/SIGTERM. Requires passwordless sudo for the binary; clear error otherwise. Auto-restart on unexpected exit with fixed backoff'
    - --tunneld-addr host:port overrides the probe target for non-default setups (alternate port, launchd-managed service, etc.)
    context: Reshaped after finding tunneld is already externally managed on the dev machine (port 49151 responding with three paired devices). External tunneld is now first-class; spyder's job is to detect and gate DVT-dependent tools. Child-process supervision becomes opt-in via --supervise-tunneld for environments where no external manager (launchd, brew services, systemd) exists. This keeps the happy path simple and avoids the passwordless-sudo setup burden for users who already have tunneld running.
