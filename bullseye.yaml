    - An integration test in 🎯T26.4 exercises both streaming shapes end-to-end, including induced inter-packet stall (bridge sends one chunk then SIGSTOPs itself), and asserts the daemon panics within the threshold
    context: 'Some bridge endpoints are legitimately slow — a device with thousands of crash reports can take minutes to enumerate, and a large crash-log file can take tens of seconds to pull. The upper bound on legitimate duration is unknowable, so a whole-result timeout is either too tight (false crash) or too loose (fails to detect hang). Streaming inverts the question: "how long between signs of progress is legitimate?" The answer is a few seconds at most, because the Python bridge''s AFC (Apple File Conduit) protocol is file-by-file and adb streams lines. NDJSON + chunked transfer was chosen over SSE (binary-unfriendly, reconnect semantics actively wrong for us), WebSockets (bidirectional, overkill, no request/response shape), and gRPC (replaces the entire protocol, new codegen toolchain in both languages). A 1-hour spike may be needed first to confirm the Python bridge''s `CrashReportsManager` surface exposes iteration; if not, the bridge drops to the AFC layer directly.'
