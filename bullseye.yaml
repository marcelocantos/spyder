      Today the daemon's only network surface is `/mcp` (JSON-RPC), and the only non-agent entry point is `spyder run <cmd>` (reservation-wrapping shell wrapper). Tests and smoke scripts (e.g. ge/tools/smoke-test.sh, ge/tools/rotation-stability-test.sh) have no way to enumerate devices, take screenshots, or hold reservations without either embedding an MCP client or bypassing spyder and shelling out to go-ios/adb directly. Bypassing defeats the reservation invariants — two concurrent consumers (e.g. an agent and a CI run) would corrupt each other's device state.

