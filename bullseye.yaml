      Spun off 2026-05-18 from 🎯T58. The original T58 acceptance asked for third-party app entries to surface; investigation showed that both lockdown-level services (`syslog_relay` and `os_trace_relay`) are hardened against third-party app output on iOS 17+. T58 was narrowed to the ostrace-relay switch (correct timestamps, structured fields, subsystem filter) that's strictly an improvement; this target captures the deeper work needed for third-party-app coverage.

      Background: Xcode's Console.app live device-log capture uses the `com.apple.instruments.server.services.activitytracetap` channel over the `instruments` DTX service. go-ios v1.0.213 defines the channel name in `ios/instruments/instruments_channels.go:activityTraceTapChannel` but has no high-level wrapper. The marcelocantos fork override at v1.0.214-... doesn't add one either.

      Surface area:

      - Likely a new `internal/device/oslog/` package (or extension to internal/goios) that opens the instruments DTX service, makes a channel request for activitytracetap, and parses the binary OSLog records the channel emits. Reference implementation: pymobiledevice3's `OsTraceService` (Python — its DTX path predates os_trace_relay) and Xcode Instruments' XPC traffic captured via dtx_codec.
      - internal/device/ios.go's LogRange / LogStream: try DTX first, fall back to ostrace_relay (current T58 path) if DTX fails.
      - May need a fork-side wrapper if the parsing is non-trivial. The `instruments.LogMessage`/etc Apple binary format is what the channel ships.
      - DDI requirements: the developer disk image must be mounted for instruments services. Spyder already exercises this via screenshot / launch_app — if those work for a device, activitytracetap should be openable too.

