  T75.1:
    name: Framing + RPC envelope — length-prefixed MessagePack with {id, method, params}/{id, result|error}
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Wire frame is `[4-byte LE length] [MessagePack bytes]`; reader rejects frames > a configurable max (default 16 MB) without crashing.
    - 'Request envelope: `{id: uint, method: str, params: any}`. Response envelope: `{id: uint, result: any}` or `{id: uint, error: {code: int, message: str, data?: any}}`.'
    - 'Spyder-side: an RPC dispatcher routes method names to registered handlers and matches responses to in-flight requests by id (timeout configurable per-call, default 30s).'
    - 'App-side reference implementation in C++ (ge or a minimal client under spyder testdata/) demonstrates: connect, send request, receive response, handle async push.'
    - 'Unit tests cover: length-prefix boundary conditions, oversized-frame rejection, malformed-MessagePack handling, unknown-method error, duplicate-id rejection.'
    context: |-
      The protocol foundation. Every other T75.x method rides on this — the framing + envelope + dispatcher trio are non-negotiable prerequisites. Get the framing right once and the next 13 methods become same-day additions.

      Design notes from the discussion:
      - MessagePack chosen for native binary support (no base64 for screenshots/perf blobs).
      - Length-prefix rather than delimiter (binary bytes can contain any byte, no usable terminator).
      - JSON-RPC-shaped envelope: familiar, well-known semantics for request/response/error, plus async server-push messages by omitting `id`.

      Pairs with [[T75]] (parent).
