    name: app_exec is spyder's single MCP entry point — every device/app/fleet operation is a Starlark builtin and the one-off MCP tools are removed
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - app_exec is spyder's sole MCP entry point and every prior operation is reachable as a Starlark builtin — i.e. 🎯T88.1 (engine), 🎯T88.2 (builtin coverage at parity), 🎯T88.3 (legacy tool removal), and 🎯T88.4 (agents-guide rewrite) are all achieved.
    - 'A representative end-to-end exercise works through `app_exec`: tap, a timed `sleep`, a `pause`/`step`/`screenshot` frame-deterministic capture, a bounded `for`-loop poll, and a start/stop handle round-trip across two calls — all without per-action agent round-trips.'
    context: |-
      Surfaced 2026-06-30. Evolved from "fire tap+screenshot in quick succession without per-action LLM round-trips" -> app_sequence step-DSL -> interstitial app_delay (rejected: Claude Code parallel tool calls have no guaranteed wire order, so order can only be guaranteed inside one tool call) -> an embedded language (Starlark, chosen over Lua for hermeticity/determinism/bounded execution) -> **single entry point**.

      DECISION (user, firmly): push EVERYTHING through app_exec; remove the one-off tools; no two pathways. Each of the agent's objections was addressed and accepted:
      - Per-tool MCP permissioning: not a concern (personal tool, user's own test devices).
      - Async/stateful lifecycle: a script is a transaction; the degenerate single-call script (start op, return handle) reproduces the old tool exactly, and state stays in spyder's server-side registries — so nothing is lost, composition is gained.
      - Blast radius / device breakage: acceptable — all test devices.
      - Arg validation moving into builtins: spyder already validates at runtime in handlers, not via rich MCP schema.

      Rationale for single pathway: forcing function for a clean/complete/consistent verb API, minimises agent context (one tool schema), removes tool-vs-script confusion.

      Scope note: app_exec subsumes spyder's EXISTING verbs only. spyder still has no device-level tap (mobile-mcp owns UI automation), so `input(...)` remains app-channel (cooperative apps); a device-level input builtin is a separate later decision. Distinct from 🎯T76.3 repl_eval (app-side eval). Generalises/absorbs 🎯T82 (its capture-window pattern becomes an app_exec script).

