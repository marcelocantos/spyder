    context: |-
      Discovered 2026-04-25 testing v0.11.0 via `brew install marcelocantos/tap/spyder` immediately after release. The daemon started, listened on :3030, the autoawake convergence loop spun up — but every iOS tool call returned `iOS adapter requires the pmd3 bridge — ensure the bridge binary is installed`. Daemon log line: `pmd3-bridge binary not found — bridge tools disabled; set SPYDER_PMD3_BRIDGE or install via Homebrew`. Root cause: `os.Executable()` returns the symlink path `/opt/homebrew/bin/spyder` (linked from `/opt/homebrew/Cellar/spyder/0.11.0/bin/spyder`); `resolveBridgeBinary` then computes `<exe-dir>/../libexec/pmd3-bridge/pmd3-bridge` = `/opt/homebrew/libexec/pmd3-bridge/pmd3-bridge`, which doesn't exist. The actual bridge is in the Cellar at `/opt/homebrew/Cellar/spyder/0.11.0/libexec/pmd3-bridge/pmd3-bridge`. This affects every Homebrew user; CI's release-test step doesn't catch it because it tests the locally-built binary, not the installed-via-tap binary. Workaround: `SPYDER_PMD3_BRIDGE=/opt/homebrew/Cellar/spyder/0.11.0/libexec/pmd3-bridge/pmd3-bridge spyder serve` works fine and verified DVT screenshot of Jevons end-to-end via MCP. Should ship as v0.12.0 ASAP — every fresh install is broken otherwise.</context>
