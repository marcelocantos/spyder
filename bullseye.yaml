  T44:
    name: the Python bridge subprocess dies with the daemon under every exit path, including panic
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - When `spyder serve` exits — clean SIGINT/SIGTERM, panic, fatal log, OOM, SIGKILL, anything — the the Python bridge subprocess it spawned terminates within 100ms via the stdin-EOF channel. No orphaned the Python bridge processes remain after the parent's death.
    - 'The child does the killing itself. **stdin-EOF mechanism (reuses existing fd 0, no new pipe slot)**: in `internal/bridge/supervisor.go:launch`, set `cmd.Stdin = readEnd` where `(readEnd, writeEnd) = os.Pipe()`. Keep `writeEnd` open in the parent for the supervisor''s lifetime; never write to it. On the Python side, `bridge/src/bridge/app.py` runs a daemon thread doing `os.read(0, 1)`; that read blocks forever while the parent is alive and returns `b''''` (EOF) the instant the kernel closes the parent''s copy of the write end. On EOF, the thread calls `os._exit(0)`. Zero polling, zero race window, works identically on macOS/Linux/BSD, regardless of how the parent died. Reuses the canonical Unix daemon convention ''a server with no interactive input has its stdin wired to a liveness probe'' — no new fd slot, no `cmd.ExtraFiles` plumbing, no fd 3 to document.'
    - '**Symmetric path is not needed.** Parent-detects-child-death is already handled by the supervisor''s `cmd.Wait()` goroutine via `waitpid()`. Single direction (parent→child via stdin) is sufficient.'
    - 'When the bridge is launched **without** the parent-piped stdin (e.g. someone runs the Python bridge manually for debugging from a terminal), stdin is a tty or `/dev/null`. The daemon thread''s `os.read(0, 1)` either blocks forever (tty waits for keystroke) or returns EOF immediately (/dev/null — fine, exits cleanly). The interactive-tty case is acceptable: the operator''s shell death sends SIGHUP which kills the bridge anyway.'
    - '**No startup reaper, no pidfile, no PID scanning needed.** EOF on a closed pipe is a kernel guarantee: every parent death pairs with exactly one child EOF and exit. There''s no failure mode where the parent dies but the child keeps running, so there''s nothing to clean up at the next spyder boot.'
    - Verified by an integration test (env-gated, e.g. SPYDER_LIFECYCLE=1) that starts `spyder serve`, sends SIGKILL to the parent, and asserts within 1s that the bridge subprocess from that run is gone. A second test exercises the panic path via a fault-injection hook and asserts the same.
    - 'Documented in STABILITY.md under the bridge supervisor section so the lifecycle invariant is part of the public contract: "the bridge subprocess does not outlive its spyder parent under any exit path; the parent''s stdin pipe is the liveness channel and guarantees this without any polling."'
    context: |-
      Surfaced 2026-04-26 ~23:05 local in the jevons MCP session: the user reported "Kill them all" referring to orphaned the Python bridge processes accumulated across multiple spyder daemon panics. The user manually cleaned them up.

      Background. The bridge supervisor (internal/bridge/supervisor.go) spawns a the Python bridge subprocess and tracks its lifecycle. Clean shutdown paths (SIGINT/SIGTERM via signal.NotifyContext) call the supervisor's Stop() which sends SIGTERM to the child and waits for exit. **Panic paths bypass this entirely.** The 🎯T41 panic path was a representative example: `c.fire(err)` → `panic(err)` → goroutine unwinds → process exits → launchd respawns the daemon — and the prior the Python bridge child is now orphaned (its parent PID becomes 1). It keeps running, holds its listener port, holds whatever fd's it had open against tunneld, and the next daemon's supervisor spawns a fresh one. Across multiple panic cycles, you accumulate zombie children. Each holds a few thousand fd's via the Python bridge, and the user-visible symptom is degraded performance plus port collisions.

      The fix has two halves:

      1. **Lifecycle binding** so the child dies with the parent under any exit path:
         - Top-level `recover()` in `main()` that runs cleanup before re-panicking. Cheap, idiomatic Go, covers the panic class but not OOM-kill.
         - **Or** spawn the bridge in a new process group (`Setsid` / `Setpgid`) and arrange for the child to receive SIGTERM when the group leader dies. Robust on macOS.
         - **Or** the simplest robust mechanism: bridge subprocess polls `os.getppid()` periodically and self-exits when it returns 1. That covers panic, OOM-kill, SIGKILL of the parent, everything. Adds ~5 lines to bridge/src/bridge/app.py. macOS has no `PR_SET_PDEATHSIG` so this is the portable answer.

      2. **Stale-bridge reaper** in `spyder serve` startup, for cases where the previous parent died before its cleanup mechanism fired. Read a pidfile (or scan for the Python bridge processes whose parent PID is 1) and SIGTERM them before binding. Avoids port collisions on launchd respawn.

      Pairs with 🎯T41 — the panic-on-transport-error fix stops the daemon from dying needlessly, but doesn't help when a real bug DOES make it panic. 🎯T44 makes panics survivable in the operational sense: no leftover state to confuse the next spyder run.

      Note: `the Python bridge remote tunneld` is run separately (manually, as root, by the user) and is NOT spyder's child. It does not need to die with spyder. The "Spyder should manage tunneld itself" question raised in the ipad-mini session is a separate architectural concern that should get its own target if pursued.
    tags:
    - bridge
    - supervisor
    - lifecycle
    - panic-recovery
    - v0.20-candidate
    - high-priority
    origin: forked-from user-reported orphaned the Python bridge processes 2026-04-26 (ipad-mini session 11191d31)
    discovered: 2026-04-26
    achieved: 2026-04-26
