  T90.2:
    name: spyder classifies a device/subprocess state change as problem-vs-benign resiliently — never on a single signal or a single instant
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Classification is a PURE FUNCTION `Classify(evidence, context) -> Assessment` over an injected evidence/context struct (per-layer states, recent events with timestamps, oracle readings from usbmux/devicectl/IOUSB, intent/reservation flags, expected_present flags) — no live device I/O inside the function. The Assessment carries a confidence level and the supporting evidence, never a bare boolean.
    - 'ORACLE (gating, class-1): a scenario table drives the pure function, one row per case: (a) LAYER LOCALIZATION — usbmux attached but RemoteXPC dead -> recoverable spyder-side fault, not physical removal; (b) EVENT-AUTHORITATIVE — usbmux detach -> USB/physical removal, unusable-without-detach -> higher-layer fault; (c) ORACLE CORROBORATION — usbmux/devicectl/IOUSB agree gone -> physical, disagreement -> stack-inconsistency/wedge; (d) DEBOUNCE + COALESCING — detach->attach within window -> silent self-heal, a fault must persist past debounce AND exhaust self-heal before needs_attention; (e) INTENT WEIGHTING — reserved/in-operation device escalates faster and to the agent, idle non-pinned stays informational; (f) EXPECTED_PRESENT — pinned absent -> needs_attention, non-pinned absent -> informational. Each row asserts the expected Assessment {state, confidence, evidence}.'
    - The classifier consumes the T89.2 usbmux event seam and the existing `spyder doctor` cross-check as evidence inputs, and feeds the notifier (T90.4). It does no I/O of its own; evidence is gathered by the T90.1 supervisor and passed in.
    - 'RESIDUE (class-4, HIL, non-gating): on real hardware, a physical unplug classifies as removal and a mid-operation stale tunnel classifies as recoverable — confirmed once in the device tier.'
    context: 'The intellectually load-bearing axis: resolving ''a device went unavailable — is that a problem or did someone unplug it?'' without false alarms. Resilience = decide on layer + corroboration + time + context, never one signal at one instant. ORACLE-FIRST (2026-07-04 reshape): the single highest-leverage conversion in the umbrella — forcing classification to be a PURE FUNCTION over an evidence struct turns a would-be class-4 (needs real faults) problem into a class-1 scenario table. If classification were entangled with live usbmux/devicectl calls it would be harness-dominant; keeping it pure makes the whole ''problem-vs-benign'' logic exhaustively table-testable.'
    depends_on:
