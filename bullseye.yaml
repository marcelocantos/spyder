  T26.1:
    name: 'Bridge transport is daemon-private: ephemeral loopback port + auth token handed over stdio'
    status: achieved
    value: 0.0
    cost: 0.0
    observable: true
    acceptance:
    - Bridge binds 127.0.0.1:0 (kernel-assigned ephemeral port) instead of a filesystem socket
    - Bridge writes a single structured ready line on stdout carrying the port and a randomly-generated auth token, e.g. `ready port=NNNNN token=<32-byte-base64>\n`
    - 'Daemon reads the ready line during supervisor `Start()` and constructs an HTTP client pointing at 127.0.0.1:NNNNN with the token set as an `Authorization: Bearer <token>` header on every request'
    - Bridge rejects any request missing or with a wrong token with HTTP 401 and a short text body; no other authentication is required for matching tokens
    - No Unix socket is created; `~/.spyder/pmd3-bridge.sock` no longer exists under any operating condition
    - External processes on the host cannot discover the port (ephemeral) or guess the token (cryptographically-random); verified by an integration test that tries to hit the bridge from outside the daemon and gets 401 or connection-refused depending on port knowledge
    - Homebrew formula and launchd plist paths that previously referenced the socket path are updated; release notes call out the user-visible change (nothing — there was no contract on the path)
    context: 'The existing 🎯T25.1 shipped an HTTP-over-Unix-socket bridge at a world-known path. That path is an architectural leak: the bridge is an implementation detail of the spyder daemon, not a shared service. Moving to an ephemeral loopback port + random auth token makes the bridge un-discoverable, un-guessable, and un-addressable from outside the daemon, and sidesteps macOS''s 104-byte Unix socket path limit as a bonus. The ready-line protocol extends the existing `ready\\n` signal (supervisor.go:207-211) so the daemon doesn''t need a second handshake round-trip.'
