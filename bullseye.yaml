  T70:
    name: Make the marcelocantos/go-ios spyder-patches rebase workflow Go-module-safe
    status: achieved
    value: 0.0
    cost: 0.0
    actual_cost: 2.0
    acceptance:
    - The documented workflow for pulling upstream into spyder-patches no longer risks orphaning SHAs that historical spyder commits pin.
    - Either (a) every spyder-pinned SHA is tagged in the fork (e.g. `spyder-pin-v0.NN.0`) before the spyder go.mod pin is bumped, with the tag pushed to the fork remote; or (b) spyder-patches uses merge-based updates against upstream/main rather than rebase + force-push.
    - The chosen approach is documented in spyder's go.mod comment block above the `replace` directive (replacing the current rebase-and-force-push instructions), and exercised at least once end-to-end so the workflow is known-good.
    context: |-
      Filed during the v0.41 / live-tests session when wiring marcelocantos/go-ios's spyder-patches branch into spyder's pin.

      The current documented workflow (in spyder's go.mod above the `replace` line) is: rebase spyder-patches onto upstream/main, force-push, bump spyder's pin to the new SHA. This works for forward builds but has a latent risk for historical spyder commits: every spyder pin is a SHA, and after a rebase the OLD spyder-patches tip becomes unreachable from any branch. GitHub eventually garbage-collects unreachable commits. If a historical spyder commit pins an orphaned SHA AND nobody has built it before (so proxy.golang.org hasn't cached it), `go build` of that historical spyder commit fails.

      In practice the risk is small for our use case (single-developer, occasional builds, proxy.golang.org caches anything ever built). But it's a latent foot-gun.

      Two fixes:
      - Tag each spyder-pinned SHA in the fork before bumping the pin (e.g. `git tag spyder-pin-v0.41.0 <sha> && git push origin spyder-pin-v0.41.0`). Tags are permanent refs; keeps the SHA reachable forever. Cleanest, preserves linear history.
      - Merge upstream/main into spyder-patches instead of rebasing. No force-push; every old SHA stays reachable via the parent chain. Uglier history (merge commits), but Go-module-proof.

      **Status update 2026-05-26 (audit):** the "single-commit / nothing to lose anyway" framing is now stale. spyder-patches carries TWO commits as of v0.48.0 (ahead_by=2, behind_by=0 vs upstream/main):
        1. `0c634f4` dtx_codec: dispatch ReadMessage on PayloadHeader.MessageType
        2. `d78573d` tunnel: self-heal a userspace tunnel whose device lifeline dies
      spyder's go.mod pin was bumped to `v1.0.214-0.20260524022121-d78573d186a3` (the d78573d SHA). Crucially, the second commit was APPENDED on top of the first, not produced by a rebase, so 0c634f4 remains reachable as d78573d's parent — no orphaning has occurred yet and no historical spyder pin is currently at risk. But the safety question is no longer hypothetical: the next time upstream/main moves and we rebase spyder-patches onto it, the current tip (d78573d) — which the live v0.48.0+ pins reference — would be orphaned. Resolve T70 before that first real rebase. The append-only growth of the branch is itself the trigger this target was waiting for.
    tags:
    - go-ios
    - fork
    - go-modules
    - code-debt
    - deferred
    origin: manual
    discovered: 2026-05-20
    achieved: 2026-05-29
