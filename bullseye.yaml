  T79:
    name: resolveAdapter routes by live-device match, not inventory + ClassifyRaw — inventory becomes purely opt-in
    status: set_aside
    value: 0.0
    cost: 0.0
    set_aside_reason: 'Plateau P: resolver UX improvement; post-P polish, not migration.'
    acceptance:
    - '`resolveAdapter(ref)` consults the live device lists between the inventory Lookup and the ClassifyRaw fallback. Resolution order: (1) inventory alias / UUID / CoreDevice / Android-serial exact match (existing behaviour); (2) live iOS device whose `DeviceName`, `UniqueDeviceID`, or `CoreDevice ID` matches `ref` (case-insensitive on DeviceName); (3) live Android device whose serial matches `ref`; (4) ClassifyRaw fallback for the offline case.'
    - Step (2) and step (3) call the adapter `List()` methods directly. Cost is enumeration latency (~100ms) per resolveAdapter call when inventory misses; cache the live snapshot in the Handler with a short TTL (e.g. 5s) so back-to-back operations against the same device don't re-enumerate.
    - 'Inventory becomes optional: an empty `~/.spyder/inventory.json` (or no file) leaves every spyder operation against a connected device working correctly, routed by live discovery. Inventory entries are still respected when present — they''re the source of truth for custom aliases (a name the device itself doesn''t advertise), notes, and stable handles for devices that are frequently offline.'
    - 'The misroute bug that surfaced 2026-06-10 — a connected iOS device whose human-readable name (e.g. "Minicades Test iPhone", "Old iPhone") didn''t match any inventory alias or iOS UDID regex got silently routed to the Android adapter and returned `device not connected` — is no longer reachable. Specifically: `device_state` against any connected iOS device''s lockdown DeviceName succeeds without an inventory entry.'
    - 'Test coverage: a unit test seeds a fake iOS adapter with a device whose `Name` is "Some iPhone" and asserts that `resolveAdapter("Some iPhone")` returns the iOS adapter (not Android). Another test seeds zero live devices and a non-UDID, non-serial-shaped string, and asserts ClassifyRaw fallback still fires (offline case).'
    - agents-guide.md and the inventory section of the README explain the new resolution order — inventory becomes documented as a *convenience layer* for aliases / notes / offline-handle stability, not a mandatory registration step.
    context: |-
      Surfaced 2026-06-10 while debugging why spyder couldn't operate on two of four connected iOS devices ("Minicades Test iPhone" and "Old iPhone"). Root cause was not in usbmuxd, the tunnel, or the iOS adapter — it was resolveAdapter misrouting the human-readable name to the Android adapter via ClassifyRaw's "default to Android" rule. `adb -s "Minicades Test iPhone"` predictably returned "device not connected", with no hint that the wrong adapter was being consulted.

      Immediate unblock was adding inventory entries for the two iPhones. But the underlying design is wrong: the live device lists already know which platform each connected device is on (spyder queries both for the `devices` MCP tool). resolveAdapter just doesn't consult them. The result is a UX trap — any user who plugs in a new iOS device and tries to operate on it by its DeviceName gets routed to Android and fails opaquely.

      The fix shape (sketched in the conversation):

          resolveAdapter(ref):
              if entry := inventory.Lookup(ref): return entry.adapter
              for d in ios.List():       if matches(d, ref): return ios
              for d in android.List():   if matches(d, ref): return android
              return ClassifyRaw(ref).adapter   # offline-only fallback

      The 5s live-snapshot cache is what keeps the enumeration latency from biting on every call inside a workflow.

      Net effect: inventory becomes optional. A fresh-spyder install with zero inventory works correctly against every connected device. Inventory entries are still useful but no longer load-bearing for basic operation — they exist for custom aliases (a name the device doesn't advertise), per-device notes, and offline-handle stability (so reservations against "Old iPhone" still route correctly even when the device is currently asleep / unplugged).

      Pairs with the recently-shipped T78 (iOS ≤16 lockdown path) — that target fixed enumeration for an under-served device class; this one fixes routing for any iOS device users hadn't manually inventoried.
    tags:
    - resolver
    - inventory
    - dispatch
    - ux
    - ios
    - android
    - surfaced-by:multimaze2
    origin: manual
    discovered: 2026-06-10
