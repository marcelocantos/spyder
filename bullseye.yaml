schema_version: 1
targets:
  T1:
    name: Bimodal spyder MCP server registers with Claude Code and dispatches tool calls end-to-end
    status: achieved
    value: 13.0
    cost: 3.0
    actual_cost: 3.0
    acceptance:
    - go build produces a single working binary at bin/spyder
    - spyder serve listens on ~/.spyder/spyder.sock and stays up across connections
    - spyder (no args) auto-starts the daemon and speaks MCP JSON-RPC over stdio
    - claude mcp add --scope user spyder -- spyder registers the server and Claude Code sees all four tools (devices, resolve, keepawake, device_state)
    - Tool calls round-trip through the proxy → daemon → handler path and return structured results
    context: 'Umbrella target — decomposed into 🎯T1.1–🎯T1.6 on 2026-04-18 to introduce observable checkpoints and unblock convergence. Rolls up automatically once 🎯T1.6 is achieved. Original scope: foundation for everything else, scaffold using mnemo-style flat layout and sawmill-style auto-starting daemon via mcpbridge.'
    depends_on:
    - T1.6
    tags:
    - scaffold
    - infrastructure
    origin: bullseye_init
    discovered: 2026-04-17
    achieved: 2026-04-18
  T1.1:
    name: go build produces a working bin/spyder binary
    status: achieved
    value: 2.0
    cost: 1.0
    actual_cost: 1.0
    acceptance:
    - make build (or go build -o bin/spyder) exits 0 on macOS arm64
    - bin/spyder --help runs and prints usage without crashing
    - bin/spyder --version prints a version string
    context: Cheapest leaf — likely already satisfied since `make bullseye` has `build` green. Kept as an explicit target so every downstream link has a verified foundation.
    tags:
    - scaffold
    - build
    origin: forked-from T1 (decomposition 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
  T1.2:
    name: spyder serve listens on ~/.spyder/spyder.sock and stays up across connections
    status: achieved
    value: 3.0
    cost: 2.0
    observable: true
    actual_cost: 2.0
    acceptance:
    - spyder serve creates ~/.spyder/spyder.sock with mode 0600
    - a client can connect via nc -U ~/.spyder/spyder.sock and receive valid MCP framing
    - a second connection works while the first is still open (concurrent sessions supported)
    - daemon logs to stderr and stays up when a client disconnects
    - second invocation of spyder serve refuses to start (socket already in use) or hands off cleanly
    context: 'First observable checkpoint: the daemon mode works in isolation, independent of the stdio proxy. Lets the agent verify the mcpbridge wiring before layering on auto-start.'
    depends_on:
    - T1.1
    tags:
    - scaffold
    - daemon
    origin: forked-from T1 (decomposition 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
  T1.3:
    name: spyder stdio proxy auto-starts the daemon and forwards MCP JSON-RPC
    status: achieved
    value: 3.0
    cost: 2.0
    observable: true
    actual_cost: 1.0
    acceptance:
    - invoking spyder with no args and piping an MCP `initialize` request on stdin yields a valid MCP response on stdout
    - if no daemon is running, the proxy starts one and connects to the socket
    - if a daemon is already running, the proxy reuses it (no duplicate process spawned)
    - proxy exits cleanly when stdin closes; daemon stays running for subsequent invocations
    context: 'Second checkpoint: the stdio → daemon bridge works end-to-end. This is the surface Claude Code actually uses. Mirrors the sawmill auto-start pattern.'
    depends_on:
    - T1.2
    tags:
    - scaffold
    - stdio
    - proxy
    origin: forked-from T1 (decomposition 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
  T1.4:
    name: MCP tools/list returns devices, resolve, keepawake, device_state with valid schemas
    status: achieved
    value: 2.0
    cost: 1.0
    observable: true
    actual_cost: 1.0
    acceptance:
    - 'JSON-RPC tools/list via the stdio proxy returns exactly four tools: devices, resolve, keepawake, device_state'
    - each tool has a non-empty inputSchema that parses as valid JSON Schema
    - each tool's description is non-empty and mentions its purpose
    context: Verifies that internal/mcp.Definitions() is wired into the handler dispatch path. A dedicated checkpoint so tool discovery is confirmed before tool invocation is tested.
    depends_on:
    - T1.3
    tags:
    - scaffold
    - mcp
    origin: forked-from T1 (decomposition 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
  T1.5:
    name: All four tools dispatch end-to-end through proxy → daemon → handler and return structured results
    status: achieved
    value: 3.0
    cost: 2.0
    observable: true
    actual_cost: 1.0
    acceptance:
    - tools/call devices returns a structured result (may be empty list if inventory unset, but with correct shape)
    - tools/call resolve with {name:"Pippa"} returns a structured result even if inventory is empty (error payload with correct JSON-RPC shape is acceptable)
    - tools/call keepawake and device_state return structured results (stub payloads are fine at this layer — this target validates the dispatch path, not the business logic)
    - unknown tool names return a proper JSON-RPC error, not a crash
    context: Confirms the full proxy → daemon → ToolHandler.Dispatch path. Tool-specific business logic lives in 🎯T2, 🎯T3, 🎯T5, 🎯T6 — this target only cares that the dispatch wiring is intact.
    depends_on:
    - T1.4
    tags:
    - scaffold
    - mcp
    - dispatch
    origin: forked-from T1 (decomposition 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
  T1.6:
    name: Claude Code registers spyder via `claude mcp add` and can list and call all four tools
    status: achieved
    value: 5.0
    cost: 1.0
    observable: true
    actual_cost: 1.0
    acceptance:
    - '`claude mcp add --scope user spyder -- spyder` registers the server without error'
    - Claude Code lists all four tools under the `spyder` server in an interactive session
    - calling each tool from within Claude Code returns a structured response (not an error dialog)
    - the registration persists across Claude Code sessions (daemon auto-starts on subsequent invocations)
    context: Final integration checkpoint. Closes the loop on the original T1 goal — the server is usable from the tool that will actually drive it. This is the external-visible \"it works\" moment.
    depends_on:
    - T1.5
    tags:
    - scaffold
    - integration
    origin: forked-from T1 (decomposition 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
  T2:
    name: Device inventory resolves symbolic aliases to all platform-specific UUIDs a device has
    status: achieved
    value: 8.0
    cost: 3.0
    observable: true
    actual_cost: 2.0
    acceptance:
    - ~/.spyder/inventory.json format is documented with at least Pippa as a worked example
    - 'resolve({name: "Pippa"}) returns both the hardware UDID (00008103-000D39301A6A201E) and the CoreDevice UUID (E1A01EA6-8D77-556C-B18D-D470B2909E87)'
    - Alias lookup is case-insensitive; raw UUIDs pass through unchanged when not in the inventory
    - Missing inventory file is handled as empty, not an error
    - devices tool annotates results with the inventory alias when the UUID matches
    context: The inventory layer is what lets the agent say \"the iPad\" or \"Pippa\" without memorising UUIDs — and lets tests target the right device by semantic name. Two UUID systems coexist in iOS tooling (hardware UDID for xctrace/xcodebuild, CoreDevice UUID for devicectl/pymobiledevice3); the inventory holds both so callers don't have to care which their downstream tool needs. Skeleton is in internal/inventory/inventory.go.
    depends_on:
    - T1
    tags:
    - inventory
    - ios
    origin: manual
    discovered: 2026-04-17
    achieved: 2026-04-18
  T3:
    name: iOS devices stay awake while plugged in via the KeepAwake companion app
    status: achieved
    value: 13.0
    cost: 8.0
    observable: true
    actual_cost: 8.0
    acceptance:
    - ios/KeepAwake/ contains a buildable Xcode project producing com.marcelocantos.spyder.KeepAwake
    - The app sets UIApplication.shared.isIdleTimerDisabled = true on foreground and unsets on background
    - Bundle is installable on Pippa via devicectl or Xcode, survives device reboot, and works with a standard free developer profile (no paid entitlements required)
    - 'keepawake({device: "Pippa"}) MCP tool foregrounds the app on the device and returns a success confirmation'
    - With the app foregrounded, a plugged-in Pippa stays awake indefinitely in practice (verified over a ≥30 minute idle window)
    context: |-
      The originating pain point: iOS has no system-level "stay awake on power" setting. A trivial SwiftUI app that holds isIdleTimerDisabled is the cleanest workaround. The MCP surface wraps the launch step so automation (test-run wrappers) can bring the app back to the foreground without manual taps. Scope-fence: no fancy UI, no telemetry, no background operation — it only works while foregrounded and that's the whole point. The iOS Shortcut automation ("when power connected → open KeepAwake") is belt-and-braces and can be set up manually by the user.

      Progress (commit 3482133): scaffolded ios/KeepAwake/ (xcodegen-driven, SwiftUI, iOS 18 target), bundle id com.marcelocantos.spyder.KeepAwake, scenePhase-driven isIdleTimerDisabled toggle. Simulator build ✓. IOSAdapter.LaunchKeepAwake wired to `xcrun devicectl device process launch`. Remaining: install on Pippa via Xcode (requires Apple ID linked in Xcode → Settings → Accounts; free developer profile suffices), then confirm ≥30 min idle hold.
    depends_on:
    - T1
    - T2
    tags:
    - ios
    - keepawake
    - swift
    origin: manual
    discovered: 2026-04-17
    achieved: 2026-04-18
  T4:
    name: Test-run orchestration auto-restores KeepAwake after xcodebuild test completes
    status: achieved
    value: 13.0
    cost: 5.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - A wrapper command (subcommand or companion script) runs xcodebuild test/run with arbitrary args, waits for completion, and foregrounds KeepAwake on exit — success or failure
    - Target device defaults to the inventory's canonical iPad (Pippa) but can be overridden
    - No race between test teardown and KeepAwake launch — if the device is still holding the test app, the wrapper waits for the test process to exit before launching KeepAwake
    - 'Idempotent: calling it when KeepAwake is already foregrounded is a no-op, not an error'
    context: The actual automation piece that closes the loop on the user's original ask. Without this, the human has to remember to re-foreground KeepAwake after every test run — which is exactly the failure mode the user described. The wrapper is what makes the workflow reliable. Could be a subcommand like `spyder run -- xcodebuild ...` or a thin shell script; decide when implementing.
    depends_on:
    - T3
    tags:
    - orchestration
    - ios
    - keepawake
    origin: manual
    discovered: 2026-04-17
    achieved: 2026-04-18
  T5:
    name: iOS adapter reports live device state (battery, thermal, charging, foreground app)
    status: achieved
    value: 5.0
    cost: 8.0
    observable: true
    actual_cost: 5.0
    acceptance:
    - 'device_state({device: "Pippa"}) returns battery level (0-100), charging bool, thermal state (nominal/fair/serious/critical), and foreground app bundle ID'
    - Implementation shells out to pymobiledevice3 and/or devicectl — no private iOS APIs, no jailbreak
    - Results are cached per-device with a short TTL (~2s) to avoid hammering the device when tools call in quick succession
    - 'Graceful degradation: if any single field is unavailable, the others are still returned with a note'
    - Error surface distinguishes "device not connected" from "tool unavailable in PATH"
    context: Value is lower than T3/T4 because it's useful but not load-bearing for the keep-awake workflow. Bumped up once an agent actually needs to reason about device state during a test session (e.g. skip thermal-sensitive tests when the iPad is 'serious'). Implementation-wise, pymobiledevice3 diagnostics covers battery and thermal; springboard queries give foreground app.
    depends_on:
    - T1
    - T2
    tags:
    - ios
    - state
    origin: manual
    discovered: 2026-04-17
    achieved: 2026-04-18
  T6:
    name: Android adapter provides feature parity for list and state (keepawake is OS-native, no-op)
    status: achieved
    value: 8.0
    cost: 2.0
    observable: true
    actual_cost: 2.0
    acceptance:
    - devices tool lists Android devices via adb, annotated with inventory alias when matched, alongside iOS devices in a single call
    - device_state({device:<android>}) returns battery level (0-100), charging bool, and foreground activity (via adb dumpsys)
    - keepawake({device:<android>}) returns a success no-op explaining that Android handles stay-awake natively via Settings → Developer options → Stay awake while plugged in
    - 'Cross-platform behaviour: a single devices call works with iOS (Pippa) and ≥1 Android devices attached simultaneously'
    context: |-
      Elevated from low-priority: user has confirmed Android is a key target. Android does NOT need the KeepAwake companion app — the OS offers a native \"stay on while plugged in\" developer setting, so the keepawake MCP tool only needs to report that cleanly. The interesting work is wiring the Android adapter for list and state via adb + dumpsys. Three Android devices are currently attached to the Mac (R5CR112X76K, T1AIOC662722687, emulator-5554) — good test bed. The cross-platform seam (internal/device.Adapter) is already in place; this is adapter fleshout, not new architecture.

      Decomposed into 🎯T6.1 (devices list + keepawake no-op) and 🎯T6.2 (device_state). Umbrella rolls up when both are achieved.
    depends_on:
    - T6.2
    tags:
    - android
    - cross-platform
    origin: manual
    discovered: 2026-04-17
    achieved: 2026-04-18
  T6.1:
    name: Android adapter lists connected devices via adb and renders keepawake as an OS-native no-op
    status: achieved
    value: 8.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - AndroidAdapter.List shells out to `adb devices -l` and returns one Info per attached device with UUID=serial, Platform=android, and Model/OS populated where available
    - devices({platform:"android"}) returns only Android devices; devices({platform:"all"}) returns iOS + Android in one call
    - inventory.AliasFor annotates Android entries via Entry.AndroidSerial when the inventory has them
    - keepawake({device:<android>}) succeeds with a structured message referring the user to Settings → Developer options → Stay awake while plugged in — no companion app launched, no error
    context: Foundation sub-target for 🎯T6. Output of `adb devices -l` is whitespace-separated with optional key:value attrs (model, device). Must be robust to offline/unauthorized states — return those devices with a note rather than erroring out. Keepawake-on-Android is a gentle no-op in this same commit because the change touches the same adapter surface.
    tags:
    - android
    - cross-platform
    - adb
    origin: forked-from T6 (reframing 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
  T6.2:
    name: Android device_state reports battery, charging, and foreground activity via adb dumpsys
    status: achieved
    value: 8.0
    cost: 5.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - AndroidAdapter.State shells out to `adb -s <serial> shell dumpsys battery` and `dumpsys activity activities` (or equivalent) to populate BatteryLevel, Charging, and ForegroundApp
    - device_state({device:<android>}) returns the populated State struct for attached Android devices tested in this session
    - Per-device 2s TTL cache matches the iOS adapter (avoid hammering)
    - 'Graceful degradation: if any single field is unavailable (e.g. dumpsys parse miss), others still return with a note'
    - Error surface distinguishes 'device not connected' (adb reports offline/unauthorized) from 'adb not in PATH'
    context: 'Depends on 🎯T6.1 for adapter basics. Battery parsing: `dumpsys battery` emits key:value lines (level, status, AC/USB/Wireless powered bools). Charging can be inferred from any powered=true. Foreground activity: `dumpsys activity activities | grep mResumedActivity` or `dumpsys window windows | grep mCurrentFocus` — pick whichever survives Android version skew. Thermal state can be added later via `dumpsys thermalservice` if useful; not required by acceptance but welcome as a bonus.'
    depends_on:
    - T6.1
    tags:
    - android
    - state
    - adb
    - dumpsys
    origin: forked-from T6 (reframing 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
  T7:
    name: spyder supervises pymobiledevice3 tunneld for reliable iOS DVT access
    status: achieved
    value: 8.0
    cost: 8.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - spyder detects and health-probes an externally-managed tunneld on startup (default 127.0.0.1:49151) and logs the paired-device count on success
    - When tunneld is unreachable, DVT-dependent tools (🎯T5 foreground, 🎯T8 iOS screenshot, 🎯T9 iOS launch/terminate) return a specific 'tunneld unavailable — start pymobiledevice3 remote tunneld or enable --supervise-tunneld' error; non-DVT tools (devices list, resolve, keepawake, Android state) are unaffected
    - 'Optional: --supervise-tunneld flag spawns `sudo -n pymobiledevice3 remote tunneld` as a managed child with clean shutdown on SIGINT/SIGTERM. Requires passwordless sudo for the binary; clear error otherwise. Auto-restart on unexpected exit with fixed backoff'
    - --tunneld-addr host:port overrides the probe target for non-default setups (alternate port, launchd-managed service, etc.)
    context: Reshaped after finding tunneld is already externally managed on the dev machine (port 49151 responding with three paired devices). External tunneld is now first-class; spyder's job is to detect and gate DVT-dependent tools. Child-process supervision becomes opt-in via --supervise-tunneld for environments where no external manager (launchd, brew services, systemd) exists. This keeps the happy path simple and avoids the passwordless-sudo setup burden for users who already have tunneld running.
    tags:
    - infrastructure
    - ios
    - pymobiledevice3
    - tunneld
    origin: research-derived (pymobiledevice3 8.x study 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
  T8:
    name: screenshot({device}) MCP tool returns a PNG for iOS and Android
    status: achieved
    value: 8.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - New `screenshot` MCP tool accepts {device} and returns the screen as an image content block (base64 PNG) usable by mcp clients without intermediate files
    - iOS path uses `pymobiledevice3 developer dvt screenshot` (requires 🎯T7 tunneld) with explicit file staging under a temp dir
    - Android path uses `adb -s <serial> shell screencap -p` and streams the PNG back
    - Result size is reasonable (≤ ~5 MB PNG per screenshot) — raw capture, no re-encoding beyond whatever the device produces
    - Error surface distinguishes 'device not connected', 'tunneld unavailable' (iOS), and 'tool not in PATH' (adb / pymobiledevice3)
    context: 'Closes the mobile-mcp gap on iOS physical devices and is a quick demonstrable win. Already validated end-to-end during research: `pymobiledevice3 developer dvt screenshot` produced a valid Pippa PNG in ~1s; mobile-mcp couldn''t see Pippa at all. Android side is trivial via screencap. Blocks on 🎯T7 only for the iOS path — Android screenshot works without tunneld.'
    depends_on:
    - T7
    tags:
    - ios
    - android
    - screenshot
    - mcp-tool
    origin: research-derived (mobile-mcp gap 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
  T9:
    name: 'App lifecycle MCP tools: list_apps, launch_app, terminate_app for iOS and Android'
    status: achieved
    value: 5.0
    cost: 5.0
    observable: true
    actual_cost: 5.0
    acceptance:
    - '`list_apps({device})` returns installed third-party apps with bundle id, name, and version. iOS: `pymobiledevice3 apps list` (no DDI needed). Android: `adb shell pm list packages -3` + `cmd package dump <pkg>` for names'
    - '`launch_app({device, bundle_id})` foregrounds an arbitrary app on the device. iOS: `pymobiledevice3 developer dvt launch <id>` (needs 🎯T7). Android: `adb shell monkey -p <pkg> -c android.intent.category.LAUNCHER 1`'
    - '`terminate_app({device, bundle_id})` stops an arbitrary app. iOS: sysmon/kill by PID (needs 🎯T7). Android: `adb shell am force-stop <pkg>`'
    - Each tool returns structured results and distinguishes 'device not connected', 'app not installed', and 'tool unavailable' errors
    context: 'Broader app-lifecycle control so agents driving mobile test workflows don''t need to fall back to mobile-mcp or Xcode for routine install/launch/kill operations. iOS side leans on the research-confirmed split: `apps list` works without DDI, launch/terminate need tunneld. Android side is straightforward adb. Defer `install_app` and `uninstall_app` to a later target unless/until a use case lands — they''re heavier and less common than the runtime trio.'
    depends_on:
    - T7
    tags:
    - ios
    - android
    - app-lifecycle
    - mcp-tool
    origin: research-derived (pymobiledevice3 8.x study 2026-04-18)
    discovered: 2026-04-18
    achieved: 2026-04-18
