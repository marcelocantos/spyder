    showcase: true
    demonstration: |-
      Five acceptance bullets implemented and exercised against the built binary. Demonstration evidence captured in this session's transcript:

      - `bin/spyder` (no args) lists `is-running` in the device-tools section, alongside the existing `launch-app`/`terminate-app` siblings.
      - `bin/spyder is-running` (no args) — usage error, exit 2 with `spyder is-running <device> <bundle-id> [--json]` synopsis.
      - `bin/spyder resolve Pippa` — returns the full inventory entry JSON (alias, platform, ios_uuid, ios_coredevice, notes), exit 0.
      - `bin/spyder resolve "this-is-not-an-alias-or-predicate"` — exit 15 with `"…" is not a known alias and not a parseable selector predicate (no '=' found)`.
      - `bin/spyder resolve "platform=android,bogus=true"` — exit 15 surfacing the parse error: `selector parse: unknown key "bogus" in "bogus=true"`.
      - `bin/spyder run --timeout banana -- echo hi` — exit 2 with `--timeout: time: invalid duration "banana"`.
      - `bin/spyder run --device foo --on "platform=ios" -- echo` — exit 2 with `--device and --on are mutually exclusive`.

      Showcase paper at `docs/papers/t38-cli-rough-edges.md` walks each acceptance bullet with before/after snippets ge's smoke-test.sh and matrix-cell.sh can adopt.

      iOS archived-log query (Bullet 2) was discharged via documentation: `STABILITY.md` §"iOS log live-window contract" codifies the constraint and points callers to `crashes` / `--follow` for the use cases that previously required retrospective queries. A runtime archived-log mode would require a bridge-layer OsTraceService binding pmd3 doesn't expose stably; the spec explicitly allows the documentation alternative.

      `make bullseye` standing invariants pass; TEST-REPORT.json refreshed.
    acceptance:
    - A `spyder is_running --device <device> --bundle-id <id>` (or equivalent) returns exit 0 if the app is running, exit 20 if not installed, exit 22 if installed-but-not-running. Distinct from `device_state.foreground_app` because it works even when the app is backgrounded, and distinct from `launch_app`'s PID-verify because it doesn't require launching anything. iOS implementation can use pmd3's `developer dvt process-id-for-bundle-id` (already used internally by autoawake's `isKeepAwakeRunning`).
    - '`spyder logs` on iOS physical devices supports an archived-log query mode in addition to the current live-window mode, so callers asking ''did this process log anything in the last 5 minutes?'' get a deterministic answer. May require routing through pmd3''s `OsTraceService` or similar; document the constraints in STABILITY.md if a true archived-log query isn''t possible (e.g. ''live tail starting from --since requires --since to be within the live-window grace period'').'
    - '`spyder resolve <name-or-predicate>` either accepts the same selector grammar as `spyder reserve --on PREDICATE` (returning the first matching device) OR returns a distinct exit code (e.g. 15 selector-not-supported) so callers can distinguish ''this isn''t a known alias and isn''t a parseable selector either'' from ''alias known but device offline.'' Today both fail with exit 1 (generic), making error reporting from scripts ambiguous.'
    - '`spyder run --on PREDICATE` accepts the same selector grammar as `spyder reserve --on PREDICATE` and resolves+reserves+runs in one call, instead of forcing callers into a two-phase resolve→release→re-acquire dance with a small race window. ge''s matrix-cell.sh (🎯T33.2 in ge) demonstrates the workaround pattern that this would obviate.'
    - '`spyder run --timeout DURATION` accepts an explicit cell budget that bounds the wrapped child invocation. Currently `spyder run` opportunistically renews the reservation indefinitely; callers can''t tell spyder ''this cell shouldn''t take more than 5 minutes'' for diagnostic purposes (it would also let spyder fail fast if the wrapped command hangs). Distinct from per-spyder-call --timeout flags.'
    context: 'Surfaced 2026-04-26 by ge''s 🎯T33.1 + 🎯T33.2 implementation work (the smoke-test.sh and matrix-cell.sh migrations to spyder CLI). Each migration succeeded but flagged distinct rough edges where the script had to fall back to platform-specific tooling or live with a less-precise contract:\n\nFrom 🎯T33.1 (smoke-test rewrite, ge PR #39):\n1. **No ''is app running'' primitive.** The script wants to passively verify ''the app is installed and currently running'' without forcing a launch. `device_state.foreground_app` is iOS-pending per STABILITY.md. The fallback today is to skip the check or use the foreground-app heuristic (which only catches the foreground app, not backgrounded ones).\n2. **`spyder logs` iOS is live-window-only.** For crash detection at smoke-test time (''did anything log an error in the last 5 minutes?''), the live-window model can miss the relevant window. The current ge fallback is to scan `~/Library/Logs/DiagnosticReports/` directly for crash files. Works but bypasses spyder.\n3. **`spyder resolve` exits 1 generic for non-alias inputs.** When the input is a selector predicate (e.g. `platform=ios-sim,os>=17`) instead of an alias, resolve fails with the same exit code as ''alias not found.'' The script can''t distinguish ''this is a selector, not an alias — try the downstream tools'' from ''this alias is genuinely unknown.''\n\nFrom 🎯T33.2 (matrix-cell rewrite, ge PR #44):\n4. **`spyder run` has no `--on PREDICATE` flag.** Only `--device <alias>`. The cell-wrapper script has to do a two-phase `spyder reserve --on PREDICATE` (to resolve a selector to an alias) → `spyder release` → `spyder run --device <alias>` dance. The workaround works but has a tiny race window (<1ms) where another caller could reserve the same device between the release and re-acquire.\n5. **`spyder run` has no `--timeout` flag.** Cell budget is invisible to spyder; opportunistic renewal keeps the reservation alive but callers can''t declare expected duration. ge''s matrix budgets cells at 5–10 minutes and would benefit from spyder enforcing that bound.\n\nNone of these block ge''s adoption — the migrations shipped with workarounds — but each is a small future-quality improvement to the spyder CLI surface. Filing here so they don''t get lost.'
