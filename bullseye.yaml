  T21:
    name: 'Visual regression tooling: semantic-first diff with pixel diff as floor'
    status: achieved
    value: 13.0
    cost: 13.0
    observable: true
    actual_cost: 8.0
    acceptance:
    - 'Baseline store: ~/.spyder/baselines/<suite>/<case>.{png,manifest.json} with per-device / per-orientation variants'
    - Compare tool accepts a screenshot + optional semantic manifest and compares against the baseline in the named suite
    - Structural diff over manifests reports added/removed/moved elements with bounding boxes
    - Pixel diff (RMS + SSIM) as fallback for regions without manifest coverage, with configurable tolerance
    - Optional VLM pass over flagged regions; emits natural-language diff summary (out of scope for v1, interface designed for it)
    - 'CLI: spyder diff <suite>/<case> <screenshot> [<manifest>]; spyder baseline update <suite>/<case>'
    - Exposed via MCP and REST; integrates with the run-artefact store
    context: |-
      Pure pixel diff (RMS, SSIM) is too brittle for typical UI changes: antialiasing jitter, font rendering, subpixel layout shifts all flag as diffs that don't matter. We want diffing that reports meaningful semantic changes (button went missing, colour palette shifted, layout reflowed, wrong scene) and ignores cosmetic noise. Pixel diff stays as the safety floor for cases where semantic methods can't decide.

      ## State of the art (roughly tiered)

      **Pixel-domain perceptual metrics** (improve over RMS without leaving pixels):
      - SSIM / MS-SSIM — structural similarity; standard baseline, tolerates brightness/contrast shifts.
      - Butteraugli, SSIMULACRA2 — model human perception (used by JPEG-XL); more forgiving of imperceptible noise.
      - LPIPS (Learned Perceptual Image Patch Similarity) — deep features from a pretrained CNN as a distance metric.

      These still can't tell you *what* is different, only *how much*.

      **Embedding-based** (global semantic similarity):
      - CLIP / DINOv2 / SigLIP — embed both images, cosine distance. Excellent at "same scene or not", poor at localisation (one scalar, not a diff map).

      **Region-based semantic diffing** (current sweet spot):
      - SAM / SAM2 — mask proposals, diff per-region. Localises and classifies changes.
      - Object-detector diffing — YOLO / Grounding-DINO; diff bounding-box sets. Catches missing/added/moved elements, misses styling.
      - Commercial: Applitools "Visual AI", Percy, Chromatic — hybrid of detector + DOM/AX tree + perceptual metric + ML classifier for cosmetic-vs-meaningful. Closed-box but the shape is clear: multi-signal fusion.

      **VLM-based** (highest ceiling, worst determinism):
      - Feed both images to Claude/GPT-4V/Gemini: "What differences would matter to a user?" Powerful for triage and natural-language diff reports; slow, costly, non-reproducible across runs. Use as a tier, not the primary decider.

      **Engine-cooperation** (the move when you own the renderer — our case):
      - Industry trend for games: emit ground-truth metadata alongside pixels. Unity's Perception package and Unreal's synthetic-data pipeline capture per-object IDs, bounding boxes, depth, normals at render time. Diffing is deterministic, local, and free at test time.
      - ge server already knows what it rendered each frame: camera state, model list, UI element list, screen-space bounds. Emitting a manifest.json alongside each frame turns "is button X visible" into an O(1) lookup. bgfx MRT can capture object-ID textures for per-pixel attribution if needed.

      ## Pragmatic stack for spyder + ge

      1. **Manifest diff** as primary — deterministic, localises changes, ignores antialiasing by construction. ge emits it from the server (separate ge-side target).
      2. **SSIM + LPIPS** as pixel floor for regions the manifest doesn't cover (globe surface, video content).
      3. **VLM pass on flagged regions only** — triage agent, never the primary decider. One call per failure, not per screenshot.
      4. **Baseline-per-variant** — device class, orientation, OS version, locale — "same semantic output, different pixels" is the norm across variants.

      Key insight: the flakiness of pure pixel diff and the flakiness of VLM-only diff share a root cause — insufficient ground truth. Engine cooperation supplies ground truth for free; the ML tier only triages residuals.

      ## Spyder's role

      Own the pipeline, run artefacts, and the compare-to-baseline workflow. Manifest emission is the app's responsibility (ge target, separate); spyder defines the manifest schema it expects and wires the tiers together.
