    - 'An unfiltered 5-second window over an attached iOS-17+ device surfaces strictly more entries than the old syslog_relay path: ~80+ distinct ImageName values (including framework paths like `/System/Library/PrivateFrameworks/RunningBoardServices`) vs the old ~50 short daemon names. System-daemon coverage already in place is preserved.'
    context: |-
      Refiled 2026-05-18 after on-device investigation. The original T58 acceptance required third-party app entries (e.g. MultiMaze2's `T17 marble[...]` lines) to surface in the spyder log stream. That turns out to require the DTX `activitytracetap` channel, which is the path Xcode's Console.app uses. Both `syslog_relay` (legacy) and `os_trace_relay` (modern) are *lockdown* services that on iOS 17+ are hardened against third-party app output regardless of routing — verified live on Jevons (iPad mini, iOS 26.4.2) running com.squz.multimaze2 at pid 702: zero ostrace entries with a `/private/var/containers/Bundle/Application/...` process path appear in any window, with either `MessageFilterLogMessage` or `MessageFilterAll`. Tracked separately as 🎯T58.1.

      What this target now delivers:
      - internal/device/ios.go LogRange / LogStream now construct `ostrace.Connection` via `ostrace.New(dev, -1, MessageFilterLogMessage, StreamFlagsAll)`.
      - `ostraceEntryToLogLine` is a trivial field copy from `ostrace.LogEntry` (PID, Timestamp, Level, ImageName, Message, Label) to `device.LogLine`.
      - The old BSD-syslog parser path (regex over `MMM D HH:MM:SS host process[pid] <level>: message`) is deleted, along with the timezone hack that suppressed per-entry since/until filtering.
      - Subsystem filter (`filter.Subsystem != ""`) now matches against `entry.Label.Subsystem` via `strings.Contains`.
      - Tool description on `logs` MCP tool no longer carries the 'Subsystem: NOT supported' caveat.

      Verified by live smoke against Jevons:
      - Unfiltered `logs(since=-2s, until=+3s)` returns 1.66 MB of structured entries in 5s (vs ~97 KB on the old path).
      - Process paths include CoreFoundation, RunningBoardServices, DTXConnectionServices, UserActivity/useractivityd, and other framework paths previously invisible — strictly a superset.
      - Timestamps include device timezone offset (`2026-05-18T21:08:09.236967+10:00`), and `since`/`until` comparisons now work correctly. No more 10h drift.

      Files touched: internal/device/ios.go (~80 lines deleted from the BSD-parser block + ~140 lines rewritten in the stream path), internal/device/ios_test.go (deleted obsolete ParseIOSSyslogLine tests), internal/device/logs_test.go (deleted obsolete ParseIOSSyslogLine tests; replaced with a comment pointing at the upstream go-ios test coverage), internal/mcp/server.go ('Subsystem: NOT supported' caveat removed), agents-guide.md ('iOS subsystem filter' caveat replaced with the corrected go-ios routing description).
