    context: |-
      Surfaced 2026-04-26 ~23:00 local while the user was driving spyder from a jevons MCP session against iPad-mini (iPad mini A17 Pro, UDID 00008130-001122334455667B, iOS 26.4.1). Symptoms captured in the jevons transcript at /Users/marcelo/.claude/projects/-Users-marcelo-work-github-com-marcelocantos-jevons/11191d31-...jsonl around 22:55-23:05:

      1. `mcp__spyder__devices` returned iPad-mini + Test iPhone (00008110-...) cleanly.
      2. `mcp__spyder__terminate_app device=iPad-mini bundle_id=com.marcelocantos.jevon` → `device not connected: iPad-mini`.
      3. `mcp__spyder__launch_app` → `device not connected: iPad-mini`.
      4. `mcp__spyder__device_state` → `reading state: device not connected: iPad-mini`.
      5. Meanwhile `xcrun devicectl device process launch ...` (which goes through tunneld) succeeded against the same UDID at the same wall-clock time.

      Root cause: bridge/src/bridge/services.py:73 `_open_lockdown(udid)` calls `the bridge's lockdown create_using_usbmux(serial=udid) helper`, which is unreliable for iOS 17+ devices — usbmuxd's view of these devices flickers, and `screenshot()` already abandoned this path in 🎯T30 in favour of `_tunneld_rsd_for(udid)` for exactly this reason. But the lockdown path is still used for everything else: device_state, launch_app, terminate_app, list_apps, logs, crashes. Each of those silently degrades to `device not connected` on iOS 17+ even when the device is fully reachable via the tunnel.

      The bridge already has `_tunneld_rsd_for(udid)` plumbed (services.py:439) returning a `RemoteServiceDiscoveryService` for any UDID in the tunneld registry. It just needs the lockdown-using endpoints rewired to consume RSD-mediated lockdown (`the Python bridge.lockdown.create_using_remote(rsd)`) when the device is in the tunneld registry, falling through to USBMux lockdown otherwise (covering iOS <17).

      Architecturally this is the iOS 17+ migration that 🎯T30 started for screenshot but never finished for the rest of the surface. There's a likely test-coverage hole too: bridge unit tests probably mock the lockdown layer in a way that doesn't expose this transport split.

      This is the second class of bug behind the user-visible "spyder keeps disconnecting" complaint, the first being the panic-on-transport-error behaviour fixed in 🎯T41. With 🎯T41 alone, the daemon stays up — but operations on iOS 17+ devices still fail with a confusing `device not connected` error.

      Companion bug 🎯T43 (empty err= in logs) makes diagnosing this harder than it should be.
