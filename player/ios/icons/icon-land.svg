<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- PlayerLand — base + L badge -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d1f33"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ec8ff"/>
      <stop offset="100%" stop-color="#2a8fd4"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="280" fill="#2a8fd4" opacity="0.18"/>
  <path d="M 400 300 L 400 724 L 760 512 Z" fill="url(#play)"/>
  <!-- L badge (bottom-right) -->
  <circle cx="780" cy="780" r="160" fill="#e8a412" stroke="#ffffff" stroke-width="16"/>
  <text x="780" y="840" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="200" font-weight="800" fill="#1a1a1a">L</text>
</svg>
